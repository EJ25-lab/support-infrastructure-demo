document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

k: #0B1215;        /* footer bar ONLY */\n\n  --ejc-orange: #F28C38;      /* caution accent */\n  --ejc-green: #34C78A;       /* proof / success accent */\n\n  /* ---- Semantic aliases ---- */\n  --text-primary: var(--ejc-text);\n  --text-secondary: var(--ejc-mid);\n  --text-tertiary: var(--ejc-light);\n  --text-accent: var(--ejc-teal);\n  --text-insight: var(--ejc-teal-deep);\n  --text-on-dark: var(--ejc-teal);\n\n  --surface-page: var(--ejc-white);\n  --surface-app: var(--ejc-off);\n  --surface-callout: var(--ejc-teal-pale);\n  --surface-footer: var(--ejc-dark);\n\n  --border-hairline: var(--ejc-warm);\n  --border-rule: var(--ejc-teal);\n  --border-accent: var(--ejc-teal);\n\n  --accent-brand: var(--ejc-teal);\n  --accent-caution: var(--ejc-orange);\n  --accent-proof: var(--ejc-green);\n}\n<\u002Fstyle>\n  <style>/* EJC Typography — Poppins, weights 300/400/600/700/800/900.\n   Body 15–16px, lead 18px, line-height ~1.7. Everything left-aligned.\n   Type scales UP, never down: if content doesn't fit, the doc gets longer. */\n:root {\n  --font-sans: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-body: var(--font-sans);\n\n  /* ---- Weights ---- */\n  --fw-light: 300;       /* @kind other */\n  --fw-regular: 400;     /* @kind other */\n  --fw-semibold: 600;    /* @kind other */\n  --fw-bold: 700;        /* @kind other */\n  --fw-extrabold: 800;   /* @kind other */\n  --fw-black: 900;       /* @kind other */\n\n  /* ---- Sizes ---- */\n  --fs-eyebrow: 11px;     /* uppercase label */\n  --fs-meta: 12px;        /* card meta, roles */\n  --fs-body: 15px;        /* default body prose */\n  --fs-body-lg: 16px;     /* comfortable body */\n  --fs-lead: 18px;        /* lead paragraph */\n  --fs-h3: 1.02rem;       /* card headline */\n  --fs-h2: 1.12rem;       /* section heading (uppercase) */\n  --fs-h1: 2rem;          /* document / hero title */\n  --fs-display: 2.75rem;  /* landing hero */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.3;       /* @kind other */\n  --lh-snug: 1.5;        /* @kind other */\n  --lh-body: 1.7;        /* @kind other */\n  --lh-relaxed: 1.75;    /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-eyebrow: 0.16em;   /* @kind other */\n  --ls-label: 0.1em;      /* @kind other */\n  --ls-heading: 0.04em;   /* @kind other */\n  --ls-tight: -0.02em;    /* @kind other */\n\n  /* ---- Semantic aliases ---- */\n  --text-leading-body: var(--lh-body);\n  --weight-emphasis: var(--fw-bold);\n}\n<\u002Fstyle>\n  <style>/* EJC Spacing, Radii & Effects.\n   Generous whitespace: no section with 3+ unbroken prose paragraphs;\n   generous gaps between sections. Soft borders, restrained shadows. */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 28px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* Semantic spacing */\n  --gap-section: var(--space-7);     /* between document sections */\n  --gap-bullet: var(--space-3);      /* between bullet items */\n  --pad-card: 22px 24px;             /* finding-card padding */\n  --pad-panel: 20px 24px;            /* callout padding */\n  --pad-page: 48px 58px 64px;        /* document page padding */\n\n  /* ---- Radii ---- */\n  --radius-sm: 5px;       /* section marker square, chips */\n  --radius-md: 10px;      /* cards, swatches */\n  --radius-lg: 14px;      /* large surfaces */\n  --radius-pill: 999px;   /* buttons, tags */\n\n  /* ---- Rules / borders ---- */\n  --rule-header: 2.5px;   /* teal rule under document header */\n  --rule-section: 1.5px;  /* teal rule under section heading */\n  --border-width: 1px;   /* @kind spacing */\n\n  /* ---- Shadows (restrained) ---- */\n  --shadow-page: 0 2px 24px rgba(0, 0, 0, 0.08);\n  --shadow-card: 0 1px 3px rgba(11, 18, 21, 0.06);\n  --shadow-raised: 0 6px 20px rgba(11, 18, 21, 0.10);\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast: 120ms;   /* @kind other */\n  --dur-base: 200ms;   /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* EJC Base — element defaults + reusable document classes.\n   These mirror the canonical EJC brief/packet patterns so a plain\n   HTML document picks up the house style with no extra CSS. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--text-primary);\n  background: var(--surface-app);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Left-align is the law — justification is banned. */\np, li, h1, h2, h3 { text-align: left; text-wrap: pretty; }\n\n/* ---- Eyebrow ---- */\n.ejc-eyebrow {\n  font-size: var(--fs-eyebrow);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-accent);\n  line-height: var(--lh-snug);\n}\n\n/* ---- Document header: light, teal rule, logo top-right ---- */\n.ejc-head {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  border-bottom: var(--rule-header) solid var(--border-rule);\n  padding-bottom: var(--space-4);\n  margin-bottom: var(--space-8);\n}\n\n/* ---- Section heading + teal marker square ---- */\n.ejc-section-h {\n  display: flex;\n  align-items: center;\n  gap: 11px;\n  border-bottom: var(--rule-section) solid var(--border-rule);\n  padding-bottom: var(--space-2);\n  margin-bottom: var(--space-4);\n}\n.ejc-section-h .ejc-marker {\n  width: 18px; height: 18px;\n  border-radius: var(--radius-sm);\n  background: var(--accent-brand);\n  flex-shrink: 0;\n}\n.ejc-section-h h2 {\n  font-size: var(--fs-h2);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-heading);\n  text-transform: uppercase;\n  color: var(--text-insight);\n}\n\n/* ---- Body type ---- */\n.ejc-lead { font-size: var(--fs-lead); line-height: var(--lh-relaxed); color: var(--text-primary); margin-bottom: var(--space-4); }\n.ejc-body { font-size: var(--fs-body); line-height: var(--lh-body); color: var(--text-secondary); margin-bottom: var(--space-3); }\n.ejc-body strong { font-weight: var(--fw-bold); color: var(--text-primary); }\n\n/* ---- Teal-pale callout panel ---- */\n.ejc-panel {\n  background: var(--surface-callout);\n  border-left: 4px solid var(--border-accent);\n  padding: var(--pad-panel);\n  margin: 6px 0 22px;\n  font-size: var(--fs-body);\n  font-weight: var(--fw-semibold);\n  color: var(--text-insight);\n  line-height: 1.65;\n}\n\n/* ---- Teal-dot bullets ---- */\n.ejc-bullets { list-style: none; margin: var(--space-1) 0 var(--space-3); padding: 0; }\n.ejc-bullets li {\n  position: relative;\n  padding-left: var(--space-6);\n  margin-bottom: var(--gap-bullet);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--text-primary);\n}\n.ejc-bullets li::before {\n  content: '';\n  position: absolute;\n  left: 5px; top: 9px;\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--accent-brand);\n}\n.ejc-bullets li strong { font-weight: var(--fw-bold); }\n\n/* ---- Footer bar (the only dark field) ---- */\n.ejc-foot {\n  background: var(--surface-footer);\n  color: var(--text-on-dark);\n  font-size: 9.5px;\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-label);\n  text-align: center;\n  padding: 9px;\n}\n<\u002Fstyle>\n  <style>/* EJC Design System — global entry point.\n   Consumers link this single file. Import order matters:\n   fonts → tokens → base. Keep this file as @import lines only. */\n/* EJC Webfont — Poppins (Google Fonts).\n   Poppins is the brand's actual typeface and ships from Google Fonts,\n   so no local binaries are bundled. Weights: 300/400/600/700/800/900. */\n/* devanagari */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"efbb7e91-039c-466b- ff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"ebce2e0d-9a3d-4dad-a5d0-196b3b7678ac\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* EJC Color System\n   Teal carries the brand. Dark is an accent (footer only), never a field.\n   Orange = caution, Green = proof — used sparingly. */\n:root {\n  /* ---- Base palette ---- */\n  --ejc-teal: #1ABCB0;        /* brand accent */\n  --ejc-teal-dark: #148F86;   /* hover / pressed teal */\n  --ejc-teal-deep: #0D6B64;   /* insight lines, section headings on light */\n  --ejc-teal-pale: #E0F7F5;   /* callout panel fields */\n\n  --ejc-text: #1A2A30;        /* primary text */\n  --ejc-mid: #4A5C64;         /* secondary / body prose */\n  --ejc-light: #8A9BA3;       /* tertiary, meta, hex labels */\n  --ejc-warm: #E8EAEA;        /* hairlines, card borders */\n  --ejc-off: #F9FAFB;         /* off-white surface */\n  --ejc-white: #FFFFFF;\n  --ejc-dark: #0B1215;        /* footer bar ONLY */\n\n  --ejc-orange: #F28C38;      /* caution accent */\n  --ejc-green: #34C78A;       /* proof / success accent */\n\n  /* ---- Semantic aliases ---- */\n  --text-primary: var(--ejc-text);\n  --text-secondary: var(--ejc-mid);\n  --text-tertiary: var(--ejc-light);\n  --text-accent: var(--ejc-teal);\n  --text-insight: var(--ejc-teal-deep);\n  --text-on-dark: var(--ejc-teal);\n\n  --surface-page: var(--ejc-white);\n  --surface-app: var(--ejc-off);\n  --surface-callout: var(--ejc-teal-pale);\n  --surface-footer: var(--ejc-dark);\n\n  --border-hairline: var(--ejc-warm);\n  --border-rule: var(--ejc-teal);\n  --border-accent: var(--ejc-teal);\n\n  --accent-brand: var(--ejc-teal);\n  --accent-caution: var(--ejc-orange);\n  --accent-proof: var(--ejc-green);\n}\n\n/* EJC Typography — Poppins, weights 300/400/600/700/800/900.\n   Body 15–16px, lead 18px, line-height ~1.7. Everything left-aligned.\n   Type scales UP, never down: if content doesn't fit, the doc gets longer. */\n:root {\n  --font-sans: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-body: var(--font-sans);\n\n  /* ---- Weights ---- */\n  --fw-light: 300;       /* @kind other */\n  --fw-regular: 400;     /* @kind other */\n  --fw-semibold: 600;    /* @kind other */\n  --fw-bold: 700;        /* @kind other */\n  --fw-extrabold: 800;   /* @kind other */\n  --fw-black: 900;       /* @kind other */\n\n  /* ---- Sizes ---- */\n  --fs-eyebrow: 11px;     /* uppercase label */\n  --fs-meta: 12px;        /* card meta, roles */\n  --fs-body: 15px;        /* default body prose */\n  --fs-body-lg: 16px;     /* comfortable body */\n  --fs-lead: 18px;        /* lead paragraph */\n  --fs-h3: 1.02rem;       /* card headline */\n  --fs-h2: 1.12rem;       /* section heading (uppercase) */\n  --fs-h1: 2rem;          /* document / hero title */\n  --fs-display: 2.75rem;  /* landing hero */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.3;       /* @kind other */\n  --lh-snug: 1.5;        /* @kind other */\n  --lh-body: 1.7;        /* @kind other */\n  --lh-relaxed: 1.75;    /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-eyebrow: 0.16em;   /* @kind other */\n  --ls-label: 0.1em;      /* @kind other */\n  --ls-heading: 0.04em;   /* @kind other */\n  --ls-tight: -0.02em;    /* @kind other */\n\n  /* ---- Semantic aliases ---- */\n  --text-leading-body: var(--lh-body);\n  --weight-emphasis: var(--fw-bold);\n}\n\n/* EJC Spacing, Radii & Effects.\n   Generous whitespace: no section with 3+ unbroken prose paragraphs;\n   generous gaps between sections. Soft borders, restrained shadows. */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 28px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* Semantic spacing */\n  --gap-section: var(--space-7);     /* between document sections */\n  --gap-bullet: var(--space-3);      /* between bullet items */\n  --pad-card: 22px 24px;             /* finding-card padding */\n  --pad-panel: 20px 24px;            /* callout padding */\n  --pad-page: 48px 58px 64px;        /* document page padding */\n\n  /* ---- Radii ---- */\n  --radius-sm: 5px;       /* section marker square, chips */\n  --radius-md: 10px;      /* cards, swatches */\n  --radius-lg: 14px;      /* large surfaces */\n  --radius-pill: 999px;   /* buttons, tags */\n\n  /* ---- Rules / borders ---- */\n  --rule-header: 2.5px;   /* teal rule under document header */\n  --rule-section: 1.5px;  /* teal rule under section heading */\n  --border-width: 1px;   /* @kind spacing */\n\n  /* ---- Shadows (restrained) ---- */\n  --shadow-page: 0 2px 24px rgba(0, 0, 0, 0.08);\n  --shadow-card: 0 1px 3px rgba(11, 18, 21, 0.06);\n  --shadow-raised: 0 6px 20px rgba(11, 18, 21, 0.10);\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast: 120ms;   /* @kind other */\n  --dur-base: 200ms;   /* @kind other */\n}\n\n/* EJC Base — element defaults + reusable document classes.\n   These mirror the canonical EJC brief/packet patterns so a plain\n   HTML document picks up the house style with no extra CSS. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--text-primary);\n  background: var(--surface-app);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Left-align is the law — justification is banned. */\np, li, h1, h2, h3 { text-align: left; text-wrap: pretty; }\n\n/* ---- Eyebrow ---- */\n.ejc-eyebrow {\n  font-size: var(--fs-eyebrow);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-accent);\n  line-height: var(--lh-snug);\n}\n\n/* ---- Document header: light, teal rule, logo top-right ---- */\n.ejc-head {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  border-bottom: var(--rule-header) solid var(--border-rule);\n  padding-bottom: var(--space-4);\n  margin-bottom: var(--space-8);\n}\n\n/* ---- Section heading + teal marker square ---- */\n.ejc-section-h {\n  display: flex;\n  align-items: center;\n  gap: 11px;\n  border-bottom: var(--rule-section) solid var(--border-rule);\n  padding-bottom: var(--space-2);\n  margin-bottom: var(--space-4);\n}\n.ejc-section-h .ejc-marker {\n  width: 18px; height: 18px;\n  border-radius: var(--radius-sm);\n  background: var(--accent-brand);\n  flex-shrink: 0;\n}\n.ejc-section-h h2 {\n  font-size: var(--fs-h2);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-heading);\n  text-transform: uppercase;\n  color: var(--text-insight);\n}\n\n/* ---- Body type ---- */\n.ejc-lead { font-size: var(--fs-lead); line-height: var(--lh-relaxed); color: var(--text-primary); margin-bottom: var(--space-4); }\n.ejc-body { font-size: var(--fs-body); line-height: var(--lh-body); color: var(--text-secondary); margin-bottom: var(--space-3); }\n.ejc-body strong { font-weight: var(--fw-bold); color: var(--text-primary); }\n\n/* ---- Teal-pale callout panel ---- */\n.ejc-panel {\n  background: var(--surface-callout);\n  border-left: 4px solid var(--border-accent);\n  padding: var(--pad-panel);\n  margin: 6px 0 22px;\n  font-size: var(--fs-body);\n  font-weight: var(--fw-semibold);\n  color: var(--text-insight);\n  line-height: 1.65;\n}\n\n/* ---- Teal-dot bullets ---- */\n.ejc-bullets { list-style: none; margin: var(--space-1) 0 var(--space-3); padding: 0; }\n.ejc-bullets li {\n  position: relative;\n  padding-left: var(--space-6);\n  margin-bottom: var(--gap-bullet);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--text-primary);\n}\n.ejc-bullets li::before {\n  content: '';\n  position: absolute;\n  left: 5px; top: 9px;\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--accent-brand);\n}\n.ejc-bullets li strong { font-weight: var(--fw-bold); }\n\n/* ---- Footer bar (the only dark field) ---- */\n.ejc-foot {\n  background: var(--surface-footer);\n  color: var(--text-on-dark);\n  font-size: 9.5px;\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-label);\n  text-align: center;\n  padding: 9px;\n}\n\n<\u002Fstyle>\n  <script src=\"9a43e1e7-d6f2-47c5-ad9f-4ff4aeee75bd\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; }\n    html { scroll-behavior: smooth; scroll-padding-top: 24px; }\n    body { margin: 0; background: #fff; font-family: 'Poppins', system-ui, sans-serif; color: #1A2A30; -webkit-font-smoothing: antialiased; }\n    .ejc-siderail { display: flex; transform: translateX(-100%); transition: transform .22s cubic-bezier(0.4,0,0.2,1); }\n    .ejc-siderail.is-open { transform: translateX(0); box-shadow: 0 0 44px rgba(11,18,21,.20); }\n    .ejc-backdrop { display: none; }\n    .ejc-backdrop.is-open { display: block; }\n    @media (min-width: 1200px) {\n      .ejc-siderail { transform: none; box-shadow: none; }\n      .ejc-tophead { display: none; }\n      .ejc-main { margin-left: 256px; }\n      .ejc-backdrop, .ejc-railclose { display: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"ejc-main\" style=\"background:#fff;\">\n\n  <div class=\"ejc-backdrop {{ railOpenClass }}\" onclick=\"{{ closeNav }}\" style=\"position:fixed;inset:0;background:rgba(11,18,21,0.4);z-index:55;\"><\u002Fdiv>\n\n  <aside class=\"ejc-siderail {{ railOpenClass }}\" style=\"position:fixed;top:0;left:0;bottom:0;width:256px;background:#fff;border-right:1px solid #E8EAEA;flex-direction:column;z-index:60;\">\n    <div style=\"padding:18px 18px 14px;border-bottom:1px solid #F0F2F2;display:flex;align-items:center;justify-content:space-between;gap:10px;\">\n      <img src=\"0060c954-b442-48b1-85da-097216d82a22\" alt=\"EdJustice Collective\" style=\"height:30px;\">\n      <button class=\"ejc-railclose\" onclick=\"{{ closeNav }}\" aria-label=\"Close menu\" style=\"display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid #E8EAEA;border-radius:8px;background:#fff;cursor:pointer;font-size:15px;color:#4A5C64;line-height:1;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <nav style=\"flex:1;overflow-y:auto;padding:14px 13px;display:flex;flex-direction:column;gap:2px;\">\n      <div style=\"font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#8A9BA3;padding:4px 11px 9px;\">Your funding view<\u002Fdiv>\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"8\">\n        <a href=\"{{ n.href }}\" onclick=\"{{ n.close }}\" style=\"{{ n.style }}\" style-hover=\"background:#F4F6F6;\">\n          <span style=\"{{ n.barStyle }}\"><\u002Fspan>\n          <span style=\"display:block;\">\n            <span style=\"display:block;font-size:13px;font-weight:700;line-height:1.3;\">{{ n.label }}<\u002Fspan>\n            <span style=\"display:block;font-size:11px;color:#8A9BA3;margin-top:1px;line-height:1.3;\">{{ n.sub }}<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"padding:15px 14px;border-top:1px solid #F0F2F2;\">\n      <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" href=\"#contact\" variant=\"primary\" size=\"md\" hint-size=\"100%,42px\">Start a conversation<\u002Fx-import>\n      <a href=\"mailto:chief@tieredjusticenow.com\" style=\"display:block;text-align:center;font-size:11px;color:#8A9BA3;text-decoration:none;margin-top:10px;\">chief@tieredjusticenow.com<\u002Fa>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <sc-if value=\"{{ gated }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;z-index:1000;background:#F9FAFB;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;\">\n      <div style=\"max-width:540px;width:100%;background:#fff;border:1px solid #E8EAEA;border-radius:18px;box-shadow:0 2px 24px rgba(0,0,0,.10);padding:42px 44px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:26px;\">\n          <img src=\"0060c954-b442-48b1-85da-097216d82a22\" alt=\"EdJustice Collective\" style=\"height:32px;\">\n          <span style=\"font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;background:#E0F7F5;padding:5px 11px;border-radius:999px;\">Free · No cost<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#1ABCB0;\">District Support Infrastructure<\u002Fdiv>\n        <h1 style=\"font-size:1.9rem;font-weight:800;letter-spacing:-0.022em;line-height:1.1;color:#1A2A30;margin:12px 0 6px;\">Do more for the people already on your team.<\u002Fh1>\n        <p style=\"font-size:15px;line-height:1.6;color:#4A5C64;margin:0 0 22px;\">No new hires, no new platform — a system that connects what you already run. Tell us who's visiting and the full board opens. It's free; we just like to know who we're building for.<\u002Fp>\n        <form onsubmit=\"{{ onSubmit }}\" style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n            <div>\n              <label style=\"font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8A9BA3;display:block;margin-bottom:5px;\">Name<\u002Flabel>\n              <input value=\"{{ fName }}\" oninput=\"{{ onName }}\" type=\"text\" placeholder=\"Your name\" style=\"width:100%;font-family:inherit;font-size:14px;color:#1A2A30;border:1px solid #E8EAEA;border-radius:9px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#1ABCB0;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8A9BA3;display:block;margin-bottom:5px;\">District / Role<\u002Flabel>\n              <input value=\"{{ fDistrict }}\" oninput=\"{{ onDistrict }}\" type=\"text\" placeholder=\"District or title\" style=\"width:100%;font-family:inherit;font-size:14px;color:#1A2A30;border:1px solid #E8EAEA;border-radius:9px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#1ABCB0;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8A9BA3;display:block;margin-bottom:5px;\">Work email<\u002Flabel>\n            <input value=\"{{ fEmail }}\" oninput=\"{{ onEmail }}\" type=\"email\" required=\"{{ true }}\" placeholder=\"you@district.org\" style=\"{{ emailStyle }}\" style-focus=\"border-color:#1ABCB0;\">\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12.5px;font-weight:600;color:#C56A1E;\">{{ errorMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" type=\"submit\" variant=\"primary\" size=\"lg\" hint-size=\"100%,48px\">{{ submitLabel }}<\u002Fx-import>\n        <\u002Fform>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap;\">\n          <span style=\"font-size:11.5px;color:#8A9BA3;line-height:1.5;\">🔒 We never share your address. One look-around, no follow-up unless you ask.<\u002Fspan>\n          <button onclick=\"{{ onSkip }}\" style=\"background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#8A9BA3;text-decoration:underline;text-underline-offset:2px;padding:0;\">Just browsing →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <header class=\"ejc-tophead\" style=\"position:sticky;top:0;z-index:20;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #E8EAEA;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:13px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <img src=\"0060c954-b442-48b1-85da-097216d82a22\" alt=\"EdJustice Collective\" style=\"height:34px;\">\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" href=\"#contact\" variant=\"primary\" size=\"sm\" hint-size=\"auto,36px\">Start a conversation<\u002Fx-import>\n        <button onclick=\"{{ toggleNav }}\" aria-label=\"Open menu\" style=\"display:flex;flex-direction:column;justify-content:center;gap:4px;width:44px;height:38px;background:#fff;border:1px solid #E8EAEA;border-radius:9px;cursor:pointer;padding:0 12px;\" style-hover=\"background:#F4F6F6;\">\n          <span style=\"display:block;height:2px;background:#1A2A30;border-radius:2px;\"><\u002Fspan>\n          <span style=\"display:block;height:2px;background:#1A2A30;border-radius:2px;\"><\u002Fspan>\n          <span style=\"display:block;height:2px;background:#1A2A30;border-radius:2px;\"><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section data-screen-label=\"Hero\" id=\"top\" style=\"max-width:1120px;margin:0 auto;padding:74px 32px 60px;\">\n    <div style=\"{{ heroPanelStyle }}\">\n      <div style=\"{{ heroGridStyle }}\">\n        <div>\n          <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Eyebrow\" hint-size=\"auto,16px\">MTSS Student Support Infrastructure · Engagement Example<\u002Fx-import>\n          <h1 style=\"font-size:3.05rem;font-weight:800;letter-spacing:-0.028em;line-height:1.06;color:#1A2A30;margin:16px 0 0;\">Built for your students.<\u002Fh1>\n          <h1 style=\"font-size:3.05rem;font-weight:300;font-style:italic;letter-spacing:-0.02em;line-height:1.06;color:#0D6B64;margin:2px 0 22px;\">Run by the team you have.<\u002Fh1>\n          <p style=\"font-size:18px;line-height:1.7;color:#4A5C64;max-width:560px;margin:0 0 28px;\">When the pathway isn't built, the student waits — not because anyone failed them, but because the system was never built to catch them. This is the MTSS build that closes that gap, and it keeps two jobs apart: <strong style=\"color:#1A2A30;font-weight:600;\">monitoring whether students get it the first time<\u002Fstrong>, and <strong style=\"color:#1A2A30;font-weight:600;\">monitoring the student support and the movement decisions that follow.<\u002Fstrong><\u002Fp>\n          <div style=\"display:flex;gap:13px;flex-wrap:wrap;\">\n            <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" href=\"#work\" variant=\"primary\" size=\"lg\" hint-size=\"auto,48px\">See the two systems<\u002Fx-import>\n            <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" href=\"#contact\" variant=\"secondary\" size=\"lg\" hint-size=\"auto,48px\">Start a conversation<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ heroHasMark }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(11,18,21,.06);overflow:hidden;\">\n            <div style=\"background:#E0F7F5;padding:16px 20px;display:flex;align-items:center;gap:13px;\">\n              <div style=\"width:46px;height:46px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 3px rgba(11,18,21,.10);\">\n                <img src=\"9d568622-9a74-4204-a921-dd01adb89a1e\" alt=\"EJC mark\" style=\"width:30px;height:30px;display:block;\">\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#0D6B64;\">The MTSS build<\u002Fdiv>\n                <div style=\"font-size:14px;font-weight:800;color:#0D6B64;\">Two systems · one data spine<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:6px 20px 14px;\">\n              <div style=\"display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid #F0F2F2;\"><span style=\"font-size:1.1rem;line-height:1.3;\">👁️<\u002Fspan><div><div style=\"font-size:13px;font-weight:700;color:#1A2A30;\">Being seen · Tier 1<\u002Fdiv><div style=\"font-size:11.5px;color:#8A9BA3;\">Is the student getting it the first time?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid #F0F2F2;\"><span style=\"font-size:1.1rem;line-height:1.3;\">🚩<\u002Fspan><div><div style=\"font-size:13px;font-weight:700;color:#1A2A30;\">Flagged → supported · Tier 2/3<\u002Fdiv><div style=\"font-size:11.5px;color:#8A9BA3;\">Does the flag get an owner — and when do we move them?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;align-items:flex-start;gap:11px;padding:11px 0;\"><span style=\"font-size:1.1rem;line-height:1.3;\">🛰️<\u002Fspan><div><div style=\"font-size:13px;font-weight:700;color:#1A2A30;\">The spine · Command Insight Center<\u002Fdiv><div style=\"font-size:11.5px;color:#8A9BA3;\">One live picture, role-gated<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:42px;\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid #E8EAEA;border-radius:10px;padding:18px 20px;background:#fff;\">\n          <div style=\"font-size:1.3rem;line-height:1;margin-bottom:7px;\">{{ s.icon }}<\u002Fdiv>\n          <div style=\"font-size:1.35rem;font-weight:800;color:#0D6B64;letter-spacing:-0.01em;line-height:1.1;\">{{ s.k }}<\u002Fdiv>\n          <div style=\"font-size:13px;font-weight:500;color:#4A5C64;margin-top:3px;\">{{ s.v }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Available Builds\" id=\"builds\" style=\"background:#F9FAFB;border-top:1px solid #E8EAEA;border-bottom:1px solid #E8EAEA;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:72px 32px;\">\n      <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">The MTSS build · Scope what you need<\u002Fx-import>\n      <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🧱&nbsp; One MTSS, built in parts you can scope<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:740px;margin:0 0 36px;\">A shared data spine, then two monitoring systems that must never run together — being seen in core, and being flagged then supported. Take the spine plus one system, or stack all three. Optional upkeep keeps the lift off your team while everyone learns the flow.<\u002Fp>\n\n      <div style=\"border:1px solid #BfeAe6;border-radius:14px;background:#E0F7F5;padding:22px 26px;margin-bottom:18px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;\">\n        <span style=\"font-size:1.7rem;line-height:1;\">🛰️<\u002Fspan>\n        <div style=\"flex:1;min-width:280px;\">\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#0D6B64;\">The spine · Data infrastructure<\u002Fdiv>\n          <div style=\"font-size:1.18rem;font-weight:800;color:#0D6B64;letter-spacing:-0.01em;margin:3px 0 5px;\">Command Insight Center<\u002Fdiv>\n          <p style=\"font-size:13px;line-height:1.6;color:#0D6B64;margin:0;opacity:.92;\">One live board, role-gated by login, inside your Google Workspace. It feeds <strong>both<\u002Fstrong> monitoring systems — neither runs on a separate spreadsheet.<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"#command\" style=\"font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#fff;background:#0D6B64;padding:10px 17px;border-radius:999px;text-decoration:none;white-space:nowrap;\">How the spine works ↓<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\">\n\n        <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;padding:26px 26px 24px;box-shadow:0 1px 3px rgba(11,18,21,.06);display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px;\">\n            <span style=\"font-size:1.4rem;line-height:1;\">👁️<\u002Fspan>\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:#0D6B64;padding:4px 10px;border-radius:5px;\">System 1 · Tier 1 · Core<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:1.18rem;font-weight:800;color:#1A2A30;letter-spacing:-0.01em;margin:8px 0 8px;\">Monitoring first-time instruction<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;margin:0 0 14px;\">Are students mastering grade-level content the first time it's taught? The teacher monitors core — before anyone is pulled.<\u002Fp>\n          <div style=\"background:#E0F7F5;border-radius:9px;padding:11px 14px;margin-bottom:16px;\">\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0D6B64;\">The need it answers<\u002Fspan>\n            <p style=\"font-size:12.5px;line-height:1.55;color:#0D6B64;font-style:italic;margin:5px 0 0;\">\"Who isn't getting it in core right now — while there's still room to reteach, before the cycle closes?\"<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:9px;\">Includes<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:18px;\">\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">First-Time Instruction Monitoring View — pulled into the Command Center at set intervals<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">In-class reteach protocol — what changes before any referral<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">Screener-to-core map — signals that adjust teaching, not trigger a pull<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">Whole-class mastery signals — one language across teachers<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #E8EAEA;margin-top:auto;padding-top:13px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#0D6B64;\">Produces &nbsp;<\u002Fspan><span style=\"font-size:12.5px;line-height:1.55;color:#4A5C64;\">one clean flag — being seen in core, or not. Nothing pulled yet.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #1ABCB0;border-radius:14px;background:#fff;padding:26px 26px 24px;box-shadow:0 6px 20px rgba(11,18,21,.10);display:flex;flex-direction:column;position:relative;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px;\">\n            <span style=\"font-size:1.4rem;line-height:1;\">🚩<\u002Fspan>\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:#1ABCB0;padding:4px 10px;border-radius:5px;\">System 2 · Tier 2/3 · Intervention<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:1.18rem;font-weight:800;color:#1A2A30;letter-spacing:-0.01em;margin:8px 0 8px;\">Monitoring student support &amp; decisions<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;margin:0 0 14px;\">Once a student is flagged: is the intervention working — and when do we move them? The flag gets an owner, a timeline, a handoff.<\u002Fp>\n          <div style=\"background:#E0F7F5;border-radius:9px;padding:11px 14px;margin-bottom:16px;\">\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0D6B64;\">The need it answers<\u002Fspan>\n            <p style=\"font-size:12.5px;line-height:1.55;color:#0D6B64;font-style:italic;margin:5px 0 0;\">\"The flag was raised — who owns it, when does support start, and when do we move or escalate to the intervention team?\"<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:9px;\">Includes<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:18px;\">\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">Diagnostic-to-assignment protocol — data drives the support-block assignment<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">Support session guide — what to target, ready before Monday<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">Movement &amp; Escalation trigger — a named answer to \"when do I move this student?\"<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:14px 1fr;gap:9px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:13px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:12.5px;line-height:1.5;color:#4A5C64;\">Student Transition Record — travels with each student at level-up<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #E8EAEA;margin-top:auto;padding-top:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n            <span><span style=\"font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#0D6B64;\">Produces &nbsp;<\u002Fspan><span style=\"font-size:12.5px;line-height:1.55;color:#4A5C64;\">named decisions — assign, move a tier, refer to the intervention team.<\u002Fspan><\u002Fspan>\n            <a href=\"#work\" style=\"font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#0D6B64;text-decoration:none;white-space:nowrap;\">Detailed below ↓<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;padding:20px 26px;margin-top:18px;box-shadow:0 1px 3px rgba(11,18,21,.06);display:flex;align-items:center;gap:20px;flex-wrap:wrap;\">\n        <span style=\"font-size:1.5rem;line-height:1;\">🛟<\u002Fspan>\n        <div style=\"flex:1;min-width:280px;\">\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4A5C64;\">Add-on · Year 1 upkeep<\u002Fdiv>\n          <div style=\"font-size:1.05rem;font-weight:800;color:#1A2A30;letter-spacing:-0.01em;margin:3px 0 5px;\">Managed Service<\u002Fdiv>\n          <p style=\"font-size:12.5px;line-height:1.55;color:#4A5C64;margin:0;\">Access changes for new hires, automation upkeep, and weekly data-pull support — handled for you while everyone learns the flow. Optional; transitions to your team after Year 1.<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#0D6B64;background:#E0F7F5;padding:9px 15px;border-radius:999px;white-space:nowrap;\">Pairs with either system<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Command Insight Center\" id=\"command\" style=\"max-width:1120px;margin:0 auto;padding:76px 32px;\">\n    <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Layer 1 · The data infrastructure<\u002Fx-import>\n    <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🛰️&nbsp; One live picture, the same for every leader<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:780px;margin:0 0 36px;\">Not a report you wait for. A board where a district-level change shows up at the school level the same day — built around the systems you already run, hosted entirely inside your district's Google Workspace.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1.05fr 0.95fr;gap:20px;align-items:start;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;margin-bottom:7px;\">🔗 What it connects<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0;\">Your student information system (like PowerSchool), your benchmark/diagnostic platform, state assessments, and the quick unit checks between the big cycles — pulled into one view at set intervals. Built around what you already run; <strong style=\"color:#1A2A30;\">no new platform to adopt.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;margin-bottom:7px;\">🔒 Where it lives<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0 0 10px;\">Inside your Google Workspace — data never leaves your environment, access gated by your district email, FERPA-safe by design. Connected by a background script built with your tech lead.<\u002Fp>\n          <div style=\"border-top:1px solid #E8EAEA;padding-top:10px;font-size:13px;font-weight:700;color:#0D6B64;line-height:1.55;\"><span style=\"margin-right:6px;\">✦<\u002Fspan>Your data coordinator controls what moves and when. EJC is the infrastructure architect — never the data custodian.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;margin-bottom:7px;\">🫱🏾‍🫲🏼 What you own<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0;\">The full build transfers to your district at handoff — repo, data backbone, scripts, and credentials. <strong style=\"color:#1A2A30;\">No license. No recurring dependency.<\u002Fstrong> An optional Year-1 managed service keeps upkeep off your team while everyone learns the flow.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;margin-bottom:7px;\">📩 What it sends<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0 0 10px;\">The monitoring view can push a <strong style=\"color:#1A2A30;\">weekly email digest<\u002Fstrong> to your school improvement leads and campus leads — the same indicators they would open the board to see, delivered to their inbox on a set day. No one has to remember to log in.<\u002Fp>\n          <div style=\"border-top:1px solid #E8EAEA;padding-top:10px;font-size:13px;font-weight:700;color:#0D6B64;line-height:1.55;\"><span style=\"margin-right:6px;\">✦<\u002Fspan>The week starts with the data already in front of the people who act on it.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#0B1215;border-radius:14px;padding:26px 28px;\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;margin-bottom:4px;\">👁 Who sees what<\u002Fdiv>\n        <p style=\"font-size:13px;line-height:1.6;color:#C9D4D6;margin:0 0 18px;\">Every view is set by login — one board, four windows into it.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <div style=\"background:rgba(26,188,176,0.12);border-left:3px solid #1ABCB0;border-radius:0 9px 9px 0;padding:13px 16px;\">\n            <div style=\"font-size:13.5px;font-weight:800;color:#fff;\">District leader<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9FB3B6;margin-top:2px;\">Sees every school — the whole system in one view<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(26,188,176,0.10);border-left:3px solid #1ABCB0;border-radius:0 9px 9px 0;padding:13px 16px;margin-left:18px;\">\n            <div style=\"font-size:13.5px;font-weight:800;color:#fff;\">Principal<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9FB3B6;margin-top:2px;\">Sees their school only<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(26,188,176,0.08);border-left:3px solid #1ABCB0;border-radius:0 9px 9px 0;padding:13px 16px;margin-left:36px;\">\n            <div style=\"font-size:13.5px;font-weight:800;color:#fff;\">School<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9FB3B6;margin-top:2px;\">Gets its own daily feed<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(26,188,176,0.06);border-left:3px solid #1ABCB0;border-radius:0 9px 9px 0;padding:13px 16px;margin-left:54px;\">\n            <div style=\"font-size:13.5px;font-weight:800;color:#fff;\">Teacher<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9FB3B6;margin-top:2px;\">Sees only their students<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Safety &amp; FERPA\" id=\"safety\" style=\"max-width:1120px;margin:0 auto;padding:76px 32px;\">\n    <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Built with your tech team · FERPA-safe by design<\u002Fx-import>\n    <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🔒&nbsp; Student data never leaves your house<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:780px;margin:0 0 26px;\">The first thing your tech lead asks is where the data lives and who can touch it. Here is the answer before they ask — and how EJC works alongside your team to keep it that way.<\u002Fp>\n\n    <div style=\"background:#E0F7F5;border-radius:14px;padding:22px 28px;margin:0 0 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n      <span style=\"font-size:1.5rem;line-height:1;color:#0D6B64;\">✦<\u002Fspan>\n      <div style=\"flex:1;min-width:280px;font-size:1.08rem;font-weight:800;color:#0D6B64;line-height:1.4;letter-spacing:-0.01em;\">EJC is the infrastructure architect — never the data custodian. Student records stay in your district's custody, every step.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;\">\n\n      <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;padding:26px 28px;box-shadow:0 1px 3px rgba(11,18,21,.06);\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;\">\n          <span style=\"font-size:1.4rem;line-height:1;\">🔒<\u002Fspan>\n          <span style=\"font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:#0D6B64;padding:4px 11px;border-radius:5px;\">Student safety &amp; FERPA<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:1.12rem;font-weight:800;color:#1A2A30;letter-spacing:-0.01em;margin:0 0 16px;\">What protects student data<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div style=\"display:grid;grid-template-columns:16px 1fr;gap:11px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:14px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">Data never leaves your environment —<\u002Fstrong> the build lives inside your Google Workspace. No district email, no access.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:16px 1fr;gap:11px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:14px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">FERPA-safe by design —<\u002Fstrong> student records stay in district custody. Nothing is copied to an EJC system.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:16px 1fr;gap:11px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:14px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">EJC sees structural data only —<\u002Fstrong> counts, score distributions, group structures. Never student names or ID numbers.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:16px 1fr;gap:11px;\"><span style=\"color:#1ABCB0;font-weight:800;font-size:14px;line-height:1.5;\">·<\u002Fspan><span style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">Your data coordinator controls every export —<\u002Fstrong> what moves, and when. The district decides.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;padding:26px 28px;box-shadow:0 1px 3px rgba(11,18,21,.06);\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;\">\n          <span style=\"font-size:1.4rem;line-height:1;\">🤝<\u002Fspan>\n          <span style=\"font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:#1ABCB0;padding:4px 11px;border-radius:5px;\">Working with your tech team<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:1.12rem;font-weight:800;color:#1A2A30;letter-spacing:-0.01em;margin:0 0 16px;\">How EJC engages — and supports — your tech lead<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div style=\"display:grid;grid-template-columns:26px 1fr;gap:12px;align-items:start;\"><span style=\"font-size:11px;font-weight:800;color:#0D6B64;background:#E0F7F5;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan><span style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">One call with your tech lead —<\u002Fstrong> EJC learns where your data lives and how it exports. No guesswork, no surprises.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:26px 1fr;gap:12px;align-items:start;\"><span style=\"font-size:11px;font-weight:800;color:#0D6B64;background:#E0F7F5;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan><span style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">A background script, built together —<\u002Fstrong> written <em>with<\u002Fem> your tech lead to connect the systems you already run. Nothing connects without their sign-off.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:26px 1fr;gap:12px;align-items:start;\"><span style=\"font-size:11px;font-weight:800;color:#0D6B64;background:#E0F7F5;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan><span style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">Your team controls data movement —<\u002Fstrong> EJC is connected in the background, never the custodian. The district decides what feeds the view.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:26px 1fr;gap:12px;align-items:start;\"><span style=\"font-size:11px;font-weight:800;color:#0D6B64;background:#E0F7F5;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan><span style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;\"><strong style=\"color:#1A2A30;font-weight:700;\">Credentials hand off at go-live —<\u002Fstrong> every access credential transfers to your district. EJC retains no access after close.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"border:1px solid #E8EAEA;border-left:4px solid #1ABCB0;border-radius:0 12px 12px 0;background:#fff;padding:20px 26px;margin-top:18px;font-size:13.5px;font-weight:700;color:#0D6B64;line-height:1.6;\"><span style=\"margin-right:8px;\">✦<\u002Fspan>Through setup and the first cycle, EJC stays available to your tech team — and an optional Year-1 managed service keeps the upkeep off them entirely while everyone learns the flow.<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"The Work\" id=\"work\" style=\"background:#F9FAFB;border-top:1px solid #E8EAEA;border-bottom:1px solid #E8EAEA;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:72px 32px;\">\n      <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Layer 2 · Support Infrastructure Build · By level<\u002Fx-import>\n      <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🧩&nbsp; The work at each level<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:760px;margin:0 0 16px;\">Each level runs both systems — but they stay on opposite sides of a bright line: <strong style=\"color:#1A2A30;font-weight:700;\">being seen in core<\u002Fstrong>, and <strong style=\"color:#1A2A30;font-weight:700;\">being flagged, then supported<\u002Fstrong>. Here is what each looks like at every level, built to that campus's real schedule and data — never a template from the network office.<\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:0 0 34px;\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#0D6B64;\"><span style=\"width:11px;height:11px;border-radius:3px;background:#0D6B64;display:inline-block;\"><\u002Fspan>System 1 · Tier 1 · Monitoring first-time instruction<\u002Fspan>\n        <span style=\"width:1px;height:16px;background:#E8EAEA;\"><\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#1ABCB0;\"><span style=\"width:11px;height:11px;border-radius:3px;background:#1ABCB0;display:inline-block;\"><\u002Fspan>System 2 · Tier 2/3 · Monitoring student support &amp; decisions<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"{{ workWrapStyle }}\">\n        <sc-for list=\"{{ levels }}\" as=\"lvl\" hint-placeholder-count=\"3\">\n          <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(11,18,21,.06);overflow:hidden;\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:20px 30px;border-bottom:1px solid #E8EAEA;\">\n              <span style=\"font-size:1.5rem;line-height:1;\">{{ lvl.icon }}<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:#1ABCB0;padding:4px 11px;border-radius:5px;\">{{ lvl.tag }}<\u002Fspan>\n              <span style=\"font-size:16px;font-weight:800;color:#1A2A30;\">{{ lvl.grades }}<\u002Fspan>\n              <span style=\"font-size:12.5px;font-weight:600;color:#8A9BA3;margin-left:auto;\">{{ lvl.scope }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;\">\n              <div style=\"padding:24px 28px;border-right:2px solid #1ABCB0;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;\">\n                  <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#fff;background:#0D6B64;padding:4px 10px;border-radius:5px;\">System 1 · Tier 1 · Core<\u002Fspan>\n                  <span style=\"font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#0D6B64;background:#E0F7F5;padding:4px 10px;border-radius:999px;\">{{ lvl.system1.monitor }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;font-weight:800;color:#1A2A30;margin-bottom:14px;\">Monitoring first-time instruction<\u002Fdiv>\n                <div style=\"font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:6px;\">The gap<\u002Fdiv>\n                <p style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;margin:0 0 16px;\">{{ lvl.system1.navPre }}<strong style=\"color:#1A2A30;font-weight:700;\">{{ lvl.system1.navBold }}<\u002Fstrong>{{ lvl.system1.navPost }}<\u002Fp>\n                <div style=\"font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:5px;\">What your team walks away with<\u002Fdiv>\n                <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ lvl.system1.walkaway }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n                <div style=\"border-top:1px solid #E8EAEA;margin-top:16px;padding-top:12px;font-size:13px;font-weight:700;color:#0D6B64;line-height:1.55;\"><span style=\"margin-right:6px;\">✦<\u002Fspan>{{ lvl.system1.decision }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:24px 28px;background:#F9FAFB;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;\">\n                  <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#fff;background:#1ABCB0;padding:4px 10px;border-radius:5px;\">System 2 · Tier 2/3 · Intervention<\u002Fspan>\n                  <span style=\"font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#0D6B64;background:#E0F7F5;padding:4px 10px;border-radius:999px;\">{{ lvl.system2.monitor }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;font-weight:800;color:#1A2A30;margin-bottom:14px;\">Monitoring student support &amp; decisions<\u002Fdiv>\n                <div style=\"font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:6px;\">The gap<\u002Fdiv>\n                <p style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;margin:0 0 16px;\">{{ lvl.system2.navPre }}<strong style=\"color:#1A2A30;font-weight:700;\">{{ lvl.system2.navBold }}<\u002Fstrong>{{ lvl.system2.navPost }}<\u002Fp>\n                <div style=\"font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:5px;\">What your team walks away with<\u002Fdiv>\n                <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ lvl.system2.walkaway }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n                <div style=\"border-top:1px solid #E8EAEA;margin-top:16px;padding-top:12px;font-size:13px;font-weight:700;color:#0D6B64;line-height:1.55;\"><span style=\"margin-right:6px;\">✦<\u002Fspan>{{ lvl.system2.decision }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid #E8EAEA;padding:14px 30px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#8A9BA3;margin-right:4px;\">Involves<\u002Fspan>\n              <sc-for list=\"{{ lvl.involves }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <span style=\"font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#0D6B64;background:#E0F7F5;padding:4px 11px;border-radius:999px;\">{{ r }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Timeline\" id=\"timeline\" style=\"max-width:1120px;margin:0 auto;padding:76px 32px;\">\n    <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Discovery through launch<\u002Fx-import>\n    <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🗺️&nbsp; A path built in three-week cycles<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:760px;margin:0 0 38px;\">Discovery starts the week your intake materials arrive. Each campus builds in sequence — and no build cycle runs longer than three weeks, because this is designed to run alongside the work already happening, not on top of a cleared calendar. Here is what each stage looks like, who is in the room, and what EJC is doing at every point.<\u002Fp>\n\n    <div style=\"display:flex;flex-direction:column;gap:20px;\">\n      <sc-for list=\"{{ stages }}\" as=\"st\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid #E8EAEA;border-radius:14px;background:#fff;padding:28px 30px;box-shadow:0 1px 3px rgba(11,18,21,.06);display:grid;grid-template-columns:56px 1fr;gap:24px;\">\n          <div style=\"width:48px;height:48px;border-radius:12px;background:#0D6B64;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;\">{{ st.n }}<\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:10px;\">\n              <span style=\"font-size:1.3rem;line-height:1;\">{{ st.icon }}<\u002Fspan>\n              <span style=\"font-size:1.3rem;font-weight:800;color:#1A2A30;letter-spacing:-0.01em;\">{{ st.name }}<\u002Fspan>\n              <span style=\"font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#1ABCB0;\">{{ st.when }}<\u002Fspan>\n              <span style=\"font-size:12px;font-weight:600;color:#8A9BA3;\">{{ st.dur }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:14.5px;line-height:1.7;color:#4A5C64;margin:0 0 18px;max-width:820px;\">{{ st.body }}<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;\">\n              <div>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:5px;\">{{ st.roomLabel }}<\u002Fdiv>\n                <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ st.room }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin-bottom:5px;\">{{ st.outLabel }}<\u002Fdiv>\n                <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ st.out }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#F9FAFB;border-radius:10px;padding:14px 18px;margin-top:14px;\">\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0D6B64;\">EJC project lead · <\u002Fspan>\n              <span style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;\">{{ st.lead }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#E0F7F5;border-left:4px solid #1ABCB0;border-radius:0 12px 12px 0;padding:26px 30px;margin-top:26px;\">\n      <div style=\"font-size:1.2rem;font-weight:800;color:#0D6B64;margin-bottom:8px;letter-spacing:-0.01em;\">Every build cycle is capped at three weeks — and runs alongside your existing work.<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#0D6B64;margin:0;max-width:840px;opacity:.92;\">Elementary campuses build first; middle and high school follow in sequence. Because every cycle is time-boxed to three weeks and built around the work already happening — not on top of a cleared calendar — each campus stays predictable, active within its own three-week window. Student Transition Records are ready before the level-up transition.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Who's Involved\" id=\"roles\" style=\"background:#F9FAFB;border-top:1px solid #E8EAEA;border-bottom:1px solid #E8EAEA;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:72px 32px;\">\n      <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Every role · Every campus<\u002Fx-import>\n      <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🫱🏾‍🫲🏼&nbsp; Who is involved and what they receive<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:740px;margin:0 0 36px;\">Every person who touches this system gets exactly what they need to do their part — and nothing more. No one reads a 40-page binder. Each guide is built from the protocol, not before it.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:18px;\">\n        <sc-for list=\"{{ roles }}\" as=\"ro\" hint-placeholder-count=\"6\">\n          <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:24px 26px;box-shadow:0 1px 3px rgba(11,18,21,.06);\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:4px;\">\n              <span style=\"font-size:1.5rem;line-height:1;\">{{ ro.marker }}<\u002Fspan>\n              <span style=\"font-size:1.12rem;font-weight:800;color:#1A2A30;\">{{ ro.title }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:600;color:#8A9BA3;margin:0 0 4px 39px;\">{{ ro.sub }}<\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;margin:14px 0 5px;\">{{ ro.recvLabel }}<\u002Fdiv>\n            <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ ro.items }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Deliverables\" id=\"deliverables\" style=\"max-width:1120px;margin:0 auto;padding:76px 32px;\">\n    <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Complete reference · Every campus · Every role<\u002Fx-import>\n    <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">📦&nbsp; All deliverables and their purpose<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:760px;margin:0 0 22px;\">Every item below is built from your campus's own staffing, schedule, and data — not adapted from a generic framework. Each deliverable has a specific job to do in the system. Nothing is produced for its own sake.<\u002Fp>\n    <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#E0F7F5;border-radius:12px;padding:18px 22px;margin-bottom:38px;\">\n      <div style=\"font-size:1.6rem;line-height:1;\">📄<\u002Fdiv>\n      <div style=\"flex:1;min-width:220px;\">\n        <div style=\"font-size:14.5px;font-weight:800;color:#0D6B64;\">See two real examples<\u002Fdiv>\n        <div style=\"font-size:13px;color:#0D6B64;opacity:.85;line-height:1.5;\">A filled-in Principal Monitoring View and Support Session Guide — de-identified, FERPA-safe.<\u002Fdiv>\n      <\u002Fdiv>\n      <a href=\"EJC-Sample-Deliverables.pdf\" download=\"EJC-Sample-Deliverables.pdf\" style=\"display:inline-flex;align-items:center;gap:8px;background:#0D6B64;color:#fff;font-size:13.5px;font-weight:700;text-decoration:none;padding:11px 20px;border-radius:999px;white-space:nowrap;\" style-hover=\"background:#09534D;\">⬇ Download sample PDF<\u002Fa>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:34px;\">\n      <sc-for list=\"{{ delivGroups }}\" as=\"g\" hint-placeholder-count=\"4\">\n        <div>\n          <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;border-bottom:1.5px solid #1ABCB0;padding-bottom:9px;margin-bottom:6px;\">\n            <span style=\"font-size:1.25rem;line-height:1;\">{{ g.icon }}<\u002Fspan><span style=\"font-size:1.05rem;font-weight:800;color:#0D6B64;letter-spacing:0.01em;\">{{ g.title }}<\u002Fspan>\n            <span style=\"font-size:12px;font-weight:600;color:#8A9BA3;margin-left:auto;\">{{ g.meta }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ g.rows }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <div style=\"display:grid;grid-template-columns:0.9fr 1.6fr;gap:28px;padding:18px 4px;border-bottom:1px solid #E8EAEA;\">\n              <div>\n                <div style=\"font-size:15px;font-weight:700;color:#1A2A30;line-height:1.35;\">{{ d.name }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;font-weight:600;color:#1ABCB0;margin-top:5px;letter-spacing:0.02em;\">{{ d.meta }}<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-top:11px;\">\n                  <sc-for list=\"{{ d.who }}\" as=\"w\" hint-placeholder-count=\"3\">\n
