               <span style=\"font-size:10.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#4A5C64;background:#F9FAFB;border:1px solid #E8EAEA;padding:3px 9px;border-radius:999px;\">{{ w }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0;\">{{ d.purpose }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Data &amp; Terms\" id=\"data\" style=\"background:#F9FAFB;border-top:1px solid #E8EAEA;border-bottom:1px solid #E8EAEA;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:72px 32px;\">\n      <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">How this works · Before we begin<\u002Fx-import>\n      <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🗄️&nbsp; Data, ownership, and next steps<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:740px;margin:0 0 36px;\">Four things worth naming before the engagement opens — how data moves, who owns what at the end, how the engagement starts, and when it runs.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:24px 26px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#1ABCB0;\">🔄 Data flow<\u002Fdiv>\n          <div style=\"font-size:1.1rem;font-weight:800;color:#1A2A30;margin:6px 0 12px;\">How data moves — and what EJC never touches<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0 0 4px;\">EJC does not have direct access to any district student information system. All data used to build and run the protocols moves through your designated data coordinator.<\u002Fp>\n          <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ dataFlow }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:24px 26px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#1ABCB0;\">🔑 Ownership<\u002Fdiv>\n          <div style=\"font-size:1.1rem;font-weight:800;color:#1A2A30;margin:6px 0 12px;\">What the district owns on the day the engagement closes<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0 0 4px;\">Every protocol, guide, monitoring view, and view built during this engagement is the district's at engagement close. No license. No recurring fee. No dependency on EJC to run what was built.<\u002Fp>\n          <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.BulletList\" items=\"{{ ownership }}\" hint-size=\"100%,auto\"><\u002Fx-import>\n          <div style=\"border-top:1px solid #E8EAEA;margin-top:8px;padding-top:12px;font-size:13.5px;font-weight:700;color:#0D6B64;line-height:1.55;\"><span style=\"margin-right:6px;\">✦<\u002Fspan>The system was built to run without us. That is the point.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:24px 26px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#1ABCB0;\">🚪 How the engagement opens<\u002Fdiv>\n          <div style=\"font-size:1.1rem;font-weight:800;color:#1A2A30;margin:6px 0 16px;\">Three steps to begin<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <sc-for list=\"{{ steps }}\" as=\"sp\" hint-placeholder-count=\"3\">\n              <div style=\"display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;\">\n                <span style=\"font-size:13px;font-weight:800;color:#1ABCB0;border:1.5px solid #1ABCB0;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;\">{{ sp.n }}<\u002Fspan>\n                <p style=\"font-size:13.5px;line-height:1.6;color:#4A5C64;margin:2px 0 0;\"><strong style=\"color:#1A2A30;font-weight:700;\">{{ sp.lead }} <\u002Fstrong>{{ sp.text }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;padding:24px 26px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#1ABCB0;\">⏱️ How long it takes<\u002Fdiv>\n          <div style=\"font-size:1.1rem;font-weight:800;color:#1A2A30;margin:6px 0 12px;\">Time-boxed, not date-bound<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#4A5C64;margin:0 0 16px;\">Every build cycle is capped at three weeks per campus and runs alongside the work already happening. Discovery to first cycle is measured in weeks from kickoff — not fixed to a calendar.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ calendar }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"display:grid;grid-template-columns:118px 1fr;gap:12px;align-items:baseline;border-left:2px solid #1ABCB0;padding:5px 0 5px 12px;\">\n                <span style=\"font-size:10.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#8A9BA3;\">{{ c.when }}<\u002Fspan>\n                <span><strong style=\"font-size:13.5px;color:#1A2A30;\">{{ c.name }}<\u002Fstrong><span style=\"font-size:12.5px;color:#4A5C64;\"> — {{ c.detail }}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Sample Session\" id=\"sample\" style=\"max-width:1120px;margin:0 auto;padding:76px 32px;\">\n    <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.SectionHeading\" hint-size=\"100%,40px\">Middle school · Discovery session · Sample<\u002Fx-import>\n    <h2 style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#1A2A30;margin:18px 0 10px;\">🔍&nbsp; What a discovery session looks like<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:#4A5C64;max-width:780px;margin:0 0 30px;\">This is a sample of what happens when Tyra sits down with one of your middle school principals. Every campus gets its own session. Nothing is assumed in advance. The protocol built for one middle campus is not the same protocol built for another — because the schedule, the staffing, and the data reality are different at every campus.<\u002Fp>\n\n    <div style=\"background:#E0F7F5;border-radius:14px;padding:30px 34px;margin-bottom:34px;\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#0D6B64;\">Middle School · Student Support Alignment Build<\u002Fdiv>\n      <div style=\"font-size:1.5rem;font-weight:800;color:#0D6B64;letter-spacing:-0.015em;margin:8px 0 12px;line-height:1.15;\">One conversation.<br>One campus-specific build brief.<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#0D6B64;opacity:.95;max-width:820px;margin:0 0 18px;\">This session is not an audit and it is not an evaluation. The principal does not need to have the right answers. The goal is to understand exactly how things work right now — the schedule as it actually runs, not as it was designed; the support-personnel assignments as they actually happen, not as the roster says they should. Everything built comes from this conversation.<\u002Fp>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <span style=\"font-size:12px;font-weight:600;color:#0D6B64;background:#fff;border-radius:999px;padding:6px 14px;\">90 minutes · one sitting<\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#0D6B64;background:#fff;border-radius:999px;padding:6px 14px;\">Principal + Student Support Lead<\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#0D6B64;background:#fff;border-radius:999px;padding:6px 14px;\">Tyra Harrison · EJC<\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#0D6B64;background:#fff;border-radius:999px;padding:6px 14px;\">Output: build brief reviewed by the CSO<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-size:1.25rem;font-weight:800;color:#1A2A30;margin:0 0 4px;\">📋 What the principal brings<\u002Fdiv>\n    <p style=\"font-size:13.5px;font-weight:600;color:#8A9BA3;margin:0 0 20px;\">Six items · No preparation required beyond pulling what already exists<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;\">\n      <sc-for list=\"{{ brings }}\" as=\"b\" hint-placeholder-count=\"6\">\n        <div style=\"border:1px solid #E8EAEA;border-radius:10px;background:#fff;padding:18px 20px;display:grid;grid-template-columns:30px 1fr;gap:13px;\">\n          <span style=\"font-size:13px;font-weight:800;color:#fff;background:#1ABCB0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;\">{{ b.n }}<\u002Fspan>\n          <div>\n            <div style=\"font-size:14.5px;font-weight:700;color:#1A2A30;line-height:1.35;margin-bottom:5px;\">{{ b.title }}<\u002Fdiv>\n            <p style=\"font-size:13px;line-height:1.6;color:#4A5C64;margin:0;\">{{ b.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"background:#F9FAFB;border-radius:10px;padding:14px 18px;margin-bottom:40px;font-size:13.5px;line-height:1.65;color:#4A5C64;\"><strong style=\"color:#1A2A30;\">A note on preparation:<\u002Fstrong> The principal does not need to analyze or summarize any of these materials before the session. Bringing them as they exist — even if they are incomplete or informal — is exactly right. The discovery session is designed to work with reality, not with polished documentation.<\u002Fdiv>\n\n    <div style=\"font-size:1.25rem;font-weight:800;color:#1A2A30;margin:0 0 4px;\">💬 The discovery questions<\u002Fdiv>\n    <p style=\"font-size:13.5px;font-weight:600;color:#8A9BA3;margin:0 0 20px;\">Five areas · Plain language · No right answers<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <sc-for list=\"{{ areas }}\" as=\"area\" hint-placeholder-count=\"5\">\n        <div style=\"border:1px solid #E8EAEA;border-radius:12px;background:#fff;overflow:hidden;\">\n          <button onclick=\"{{ area.toggle }}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:18px 22px;display:flex;align-items:center;gap:14px;font-family:inherit;\">\n            <span style=\"font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#0D6B64;\">{{ area.area }}<\u002Fspan>\n            <span style=\"font-size:13px;color:#4A5C64;\">{{ area.sub }}<\u002Fspan>\n            <span style=\"margin-left:auto;display:flex;align-items:center;gap:10px;\">\n              <span style=\"font-size:11px;font-weight:700;color:#8A9BA3;\">{{ area.countLabel }}<\u002Fspan>\n              <span style=\"{{ area.caretStyle }}\">▾<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ area.open }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"padding:0 22px 8px;border-top:1px solid #E8EAEA;\">\n              <sc-for list=\"{{ area.questions }}\" as=\"q\" hint-placeholder-count=\"3\">\n                <div style=\"padding:18px 0;border-bottom:1px solid #F0F2F2;\">\n                  <p style=\"font-size:15px;font-weight:600;line-height:1.6;color:#1A2A30;margin:0 0 10px;\">{{ q.q }}<\u002Fp>\n                  <div style=\"background:#F9FAFB;border-radius:8px;padding:12px 16px;\">\n                    <span style=\"font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#1ABCB0;\">What this surfaces · <\u002Fspan>\n                    <span style=\"font-size:13.5px;line-height:1.65;color:#4A5C64;\">{{ q.surfaces }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#0B1215;border-radius:12px;padding:24px 28px;margin-top:22px;\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1ABCB0;margin-bottom:8px;\">EJC on student data<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.7;color:#C9D4D6;margin:0;max-width:880px;\">EJC works from de-identified structural data only. Student names and ID numbers never leave the district's custody. The district data coordinator owns all data movement within the district's own environment. EJC receives only the aggregate information needed to build the routing logic — score distributions, group structures, identification thresholds — not individual student records.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Contact\" id=\"contact\" style=\"max-width:1120px;margin:0 auto;padding:30px 32px 80px;\">\n    <div style=\"background:#E0F7F5;border-radius:16px;padding:48px 44px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;\">\n      <div style=\"max-width:560px;\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#0D6B64;margin-bottom:10px;\">Build Systems. Promote Justice.<\u002Fdiv>\n        <div style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em;color:#0D6B64;line-height:1.12;margin-bottom:12px;\">Bring the same build to your district.<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.65;color:#0D6B64;opacity:.9;margin:0;\">Discovery opens the week your intake materials arrive. One document per campus to begin — EJC sends the intake template.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" href=\"mailto:chief@tieredjusticenow.com\" variant=\"primary\" size=\"lg\" hint-size=\"auto,48px\">chief@tieredjusticenow.com<\u002Fx-import>\n        <x-import component-from-global-scope=\"EdJusticeCollectiveDesignSystem_f6e555.Button\" href=\"https://ej25-lab.github.io/support-infrastructure-demo/\" variant=\"secondary\" size=\"lg\" hint-size=\"auto,48px\">See the interactive walkthrough<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#0B1215;color:#1ABCB0;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-align:center;padding:14px;\">EdJustice Collective&nbsp;&nbsp;·&nbsp;&nbsp;Build Systems. Promote Justice.&nbsp;&nbsp;·&nbsp;&nbsp;chief@tieredjusticenow.com<\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 900}, &quot;heroStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;split&quot;, &quot;panel&quot;, &quot;stacked&quot;], &quot;default&quot;: &quot;split&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;workStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;rows&quot;, &quot;cards&quot;], &quot;default&quot;: &quot;rows&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;gateEnabled&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}, &quot;captureEndpoint&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;}}\">\nclass Component extends DCLogic {\n  // ⬇⬇⬇ DEPLOY: paste your Apps Script /exec URL between the quotes. Single-line find/replace target. ⬇⬇⬇\n  CAPTURE_ENDPOINT = \"https://script.google.com/macros/s/AKfycbwrSIWcwwL4AiYyOWlUduchszym-hiXTqcePogiQx7d4oqjym66_9voDQBXG6ZCDgkuug/exec\";  // Apps Script /exec URL goes here\n  // ⬆⬆⬆ Leave empty to keep the gate working without capture (sign-ups just open the board). ⬆⬆⬆\n\n  state = {\n    openAreas: { 0: true },\n    gated: true,\n    form: { name: '', email: '', district: '' },\n    sending: false,\n    error: '',\n    activeSection: 'builds',\n    navOpen: false,\n  };\n\n  componentDidMount() {\n    try {\n      if (this.props.gateEnabled === false || localStorage.getItem('ejc_board_visitor')) {\n        this.setState({ gated: false });\n      }\n    } catch (e) {\n      this.setState({ gated: false });\n    }\n    this._navIds = ['builds', 'command', 'safety', 'work', 'timeline', 'roles', 'deliverables', 'data', 'sample', 'contact'];\n    this._onScroll = () => {\n      const y = window.scrollY + 150;\n      let cur = this._navIds[0];\n      for (const id of this._navIds) {\n        const el = document.getElementById(id);\n        if (el && el.offsetTop <= y) cur = id;\n      }\n      if (cur !== this.state.activeSection) this.setState({ activeSection: cur });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  toggleNav = () => this.setState((s) => ({ navOpen: !s.navOpen }));\n  closeNav = () => this.setState({ navOpen: false });\n\n  toggleArea = (i) => {\n    this.setState((s) => ({ openAreas: { ...s.openAreas, [i]: !s.openAreas[i] } }));\n  };\n\n  setField = (key) => (e) => {\n    const v = e && e.target ? e.target.value : '';\n    this.setState((s) => ({ form: { ...s.form, [key]: v }, error: '' }));\n  };\n\n  openBoard = (record) => {\n    try { localStorage.setItem('ejc_board_visitor', JSON.stringify(record)); } catch (e) {}\n    this.setState({ gated: false, sending: false });\n  };\n\n  submitGate = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const { name, email, district } = this.state.form;\n    const ok = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email.trim());\n    if (!ok) {\n      this.setState({ error: 'Please enter a valid email so we know who is visiting.' });\n      return;\n    }\n    const record = { name: name.trim(), email: email.trim(), district: district.trim(), ts: new Date().toISOString() };\n    const endpoint = (this.CAPTURE_ENDPOINT || '').trim() || this.props.captureEndpoint;\n    if (endpoint) {\n      this.setState({ sending: true });\n      const body = new FormData();\n      // Match the AI Family Room signup sheet columns: Name, Email, Installation, Source, SessionInterest\n      body.append('Name', record.name);\n      body.append('Email', record.email);\n      body.append('Installation', record.district);\n      body.append('Source', 'Support Infrastructure Board');\n      body.append('SessionInterest', '');\n      fetch(endpoint, { method: 'POST', mode: 'no-cors', body })\n        .catch(() => {})\n        .finally(() => this.openBoard(record));\n    } else {\n      this.openBoard(record);\n    }\n  };\n\n  skipGate = () => this.setState({ gated: false });\n\n  get LEVELS() {\n    return [\n      {\n        icon: '🍎', tag: 'Elementary', grades: 'K–4 · Core Literacy', scope: 'Multiple campuses',\n        involves: ['CSO', 'ES Principals', 'Support Personnel', 'Teachers', 'EJC'],\n        system1: {\n          monitor: 'Teacher monitors core',\n          navPre: 'Universal screening runs and core literacy is taught — but ',\n          navBold: 'no shared signal shows who isn\\u2019t mastering grade-level content the first time it\\u2019s taught,',\n          navPost: ' so a student can sit in core, doing just enough to avoid a flag, and stay invisible until the next screener.',\n          walkaway: [\n            { lead: 'First-Time Instruction Monitoring View —', text: 'whole-class mastery pulled into the Command Center at set intervals, read each week' },\n            { lead: 'In-Class Reteach Protocol —', text: 'what changes in core instruction before any student is pulled' },\n            { lead: 'Screener-to-Core Map —', text: 'which screener signals adjust core teaching — not trigger a referral' },\n          ],\n          decision: 'Is this student being seen in core — getting it the first time — or not? One clean flag, nothing pulled yet.',\n        },\n        system2: {\n          monitor: 'Teacher + AP → Interventionist + Intervention Team',\n          navPre: 'Once a student is flagged, the diagnostic and the support block exist — but ',\n          navBold: 'with no named owner, timeline, or handoff, the flag disappears,',\n          navPost: ' support personnel get assigned by availability, and \\u201cwhen do I move this student?\\u201d was never built.',\n          walkaway: [\n            { lead: 'Diagnostic-to-Assignment Protocol —', text: 'data drives the support-block assignment before the week starts' },\n            { lead: 'Support Session Guide —', text: 'what the data shows and what to target, ready before Monday' },\n            { lead: 'Movement & Escalation Trigger —', text: 'a named answer to when a student moves a tier or goes to the intervention team' },\n            { lead: 'Student Transition Record —', text: 'travels with each student at the level-up transition' },\n          ],\n          decision: 'Assign, move a tier, or refer to the intervention team — each a named call with an owner and a start date, not a flag that waits.',\n        },\n      },\n      {\n        icon: '🧭', tag: 'Middle', grades: 'Grades 5–8 · Student Support', scope: 'Multiple campuses',\n        involves: ['CSO', 'MS Principals', 'Support Personnel & Lead', 'Teachers', 'EJC'],\n        system1: {\n          monitor: 'Teacher monitors core',\n          navPre: 'Content teachers screen and teach — but ',\n          navBold: 'first-time mastery is read subject by subject, with no shared signal,',\n          navPost: ' so a student slipping in core looks the same as one who simply needs the support block.',\n          walkaway: [\n            { lead: 'First-Time Instruction Monitoring View —', text: 'core-mastery pulled into the Command Center at set intervals, one language across subjects' },\n            { lead: 'Reteach-vs-Refer Guide —', text: 'what core instruction handles before student support personnel are involved' },\n          ],\n          decision: 'Is this a core-instruction adjustment, or a true Tier 2 flag? Named before anyone is pulled.',\n        },\n        system2: {\n          monitor: 'Support Lead + AP → Interventionist + Intervention Team',\n          navPre: 'Student support personnel provide two hours of daily small-group support. But ',\n          navBold: 'when support personnel are assigned by availability instead of by the diagnostic,',\n          navPost: ' that investment delivers general help — and the flag a teacher raised can sit for weeks with no named owner.',\n          walkaway: [\n            { lead: 'Diagnostic-to-Assignment Protocol —', text: 'data drives support-personnel assignments before the week starts' },\n            { lead: 'Teacher–Support Handoff —', text: 'what passes between teacher and support personnel each session, both directions' },\n            { lead: 'Movement & Escalation Trigger —', text: 'a named answer to \\u201cwhen do I move this student?\\u201d' },\n          ],\n          decision: 'Assign by data, move on a trigger, escalate to the intervention team — the same named calls on every campus.',\n        },\n      },\n      {\n        icon: '🎓', tag: 'High School', grades: 'Grades 9–12 · Graduation Triage', scope: 'Single campus',\n        involves: ['CSO', 'HS Principal', 'Support Personnel', 'Counselors', 'EJC'],\n        system1: {\n          monitor: 'Content teacher monitors core',\n          navPre: 'In content classes, reading gaps show up as failed work — but ',\n          navBold: 'nothing separates a first-time-instruction miss from a years-old skills gap,',\n          navPost: ' so the same student stays invisible until a transcript review makes the gap impossible to miss.',\n          walkaway: [\n            { lead: 'Literacy-in-Content Monitoring —', text: 'one core-instruction signal per content unit, read in the room' },\n            { lead: 'Reteach-in-Content Move —', text: 'the in-class adjustment that comes before any triage referral' },\n          ],\n          decision: 'Can core instruction still close this, or is it a triage case? Named in the content class — not at transcript review.',\n        },\n        system2: {\n          monitor: 'Counselors + Interventionist + Intervention Team',\n          navPre: 'Students who never closed their reading gaps are now short on graduation credits. ',\n          navBold: 'The question is who is in danger right now — and whether anyone owns the next 30 days,',\n          navPost: ' because a referral form with no named start date is how a senior runs out of runway.',\n          walkaway: [\n            { lead: 'Early Warning Protocol —', text: '9th & 10th graders showing the pattern, flagged early' },\n            { lead: '30-Day Triage Response —', text: 'named person, session & target within the first month' },\n            { lead: 'Graduation Pathway View —', text: 'what the principal & CSO see each week, before the semester closes' },\n          ],\n          decision: 'Who triages, what the session targets, when the intervention team or a counselor steps in — all named, all owned.',\n        },\n      },\n    ];\n  }\n\n  get STAGES() {\n    return [\n      {\n        n: '1', icon: '🔍', name: 'Discovery', when: 'Week 1', dur: '~2 hrs per campus',\n        body: 'One focused conversation per campus. No assumptions are made about what is working or what needs to change. The goal is to understand each campus\\u2019s actual schedule, actual staffing, and how diagnostic data currently moves — or doesn\\u2019t — from assessment to action.',\n        roomLabel: 'Who is in the room',\n        room: [\n          { lead: 'the CSO —', text: 'network context, priorities, what success looks like across all campuses' },\n          { lead: 'Campus Principal —', text: 'schedule reality, staffing, current Core Literacy structure' },\n          { lead: 'Student Support Lead —', text: 'how support personnel are currently assigned and how Walkthrough observations run' },\n        ],\n        outLabel: 'What comes out of this stage',\n        out: ['Campus-specific build brief for each school', 'Confirmed diagnostic data structure and export pathway', 'Staffing map: who owns what in the current system'],\n        lead: 'Leads each discovery session. Listens before building. Leaves with enough to build a protocol mapped to your campus\\u2019s reality, not a template. The CSO reviews the build brief before any protocol work begins.',\n      },\n      {\n        n: '2', icon: '🏗️', name: 'Build', when: 'Weeks 2–4', dur: '≤ 3 weeks per campus',\n        body: 'Each campus gets its own protocol built to its own staffing and schedule reality. Each build cycle is capped at three weeks and runs alongside the work already happening. Elementary campuses build first. Middle school follows in sequence. High school closes the build. The CSO reviews each protocol before it goes to the campus principal — nothing is delivered to a building without CSO sign-off.',\n        roomLabel: 'Who is involved',\n        room: [\n          { lead: 'the CSO —', text: 'reviews and approves each campus protocol before delivery' },\n          { lead: 'Campus Principal —', text: 'reviews draft, confirms scheduling and staffing fit' },\n          { lead: 'EJC —', text: 'builds each protocol, integrates Walkthrough alignment at MS level, generates Student Transition Records from ES data' },\n        ],\n        outLabel: 'What comes out of this stage',\n        out: ['First-Time Instruction Monitoring + reteach protocol — Tier 1, per campus', 'Diagnostic-to-Assignment + Movement/Escalation trigger — Tier 2/3, per campus', '30-Day Triage Response — HS, Tier 2/3', 'Student Transition Records — ES to MS, auto-generated', 'Monitoring views — both systems, one shared language'],\n        lead: 'Builds each campus protocol off the discovery brief. Sends a draft to the CSO for review before the campus principal sees it. Incorporates revisions and confirms fit. The Student Transition Record is generated at the close of the ES build — ready before orientation.',\n      },\n      {\n        n: '3', icon: '📣', name: 'Orientation', when: 'Before launch', dur: '90 min per campus',\n        body: 'One working session per campus — teachers, support personnel, and the principal in the same room. This is not a training day. It is the session where the protocol becomes theirs. Every person who will touch the system leaves the room knowing exactly what they do, when they do it, and what happens next.',\n        roomLabel: 'Who is in the room',\n        room: [\n          { lead: 'Campus Principal / AP —', text: 'owns the monitoring view; understands escalation triggers' },\n          { lead: 'Classroom Teachers —', text: 'understand their role in the routing protocol and the two-sentence flag' },\n          { lead: 'Support Personnel & Lead —', text: 'walk through the assignment protocol and the movement trigger' },\n          { lead: 'HS: Counselors —', text: 'introduced to the early warning list and the 30-day triage response' },\n        ],\n        outLabel: 'What comes out of this stage',\n        out: ['Role-specific one-page guide — every person leaves with exactly what they need, nothing more', 'First-week activation checklist — confirmed assignments, confirmed groupings, confirmed monitoring view', 'The CSO\\u2019s network monitoring view — active before launch day'],\n        lead: 'Leads each campus orientation session. Walks every role through their specific guide. Confirms that every person can answer: what do I do Monday morning? Does not leave until that question has a clear answer for each role in the room.',\n      },\n      {\n        n: '4', icon: '🚀', name: 'Launch & First Cycle', when: 'First full cycle', dur: 'Day-30 & day-60 check-ins',\n        body: 'The system runs its first full diagnostic cycle with the protocol active. This is not a handoff — EJC stays present through the first cycle. A check-in at day 30 addresses anything that needs adjusting before the second cycle begins. A check-in at day 60 confirms the system is running without ongoing support.',\n        roomLabel: 'Who is involved',\n        room: [\n          { lead: 'the CSO —', text: 'reviewing network monitoring view; flagging anything that looks off across campuses' },\n          { lead: 'Campus Principals —', text: 'running the monitoring view; escalating through the named pathway' },\n          { lead: 'Support Personnel & Teachers —', text: 'executing the routing protocol; flagging questions through the principal' },\n        ],\n        outLabel: 'What this stage confirms',\n        out: ['Identification window is operating — students flagged in days, not weeks', 'Support-personnel assignments are running from diagnostic data, not availability', 'The CSO can see across all campuses from one view', 'Day 60: system runs without ongoing EJC support'],\n        lead: 'Available through the first cycle for questions and adjustments. Leads the day-30 check-in — one focused conversation with the CSO to review what the monitoring view is showing and make any protocol adjustments before the second cycle. Leads the day-60 confirmation that the system is self-sustaining.',\n      },\n    ];\n  }\n\n  get ROLES() {\n    return [\n      { marker: '🔭', title: 'Your District Leader', sub: 'Supt · Asst. Supt · CAO · CSO — whoever holds the district seat · All campuses', recvLabel: 'What your district leader receives', items: [\n        'A network monitoring view — system-level signals across all campuses in one place, updated each diagnostic cycle',\n        'Review and approval at every stage — no protocol goes to a principal without district-level sign-off first',\n        'Shared decision language across all campuses — so every principal conversation starts from the same place',\n        'A cross-level transition view — which students are moving from ES to MS at the level-up transition, and confirmation that their records have traveled with them',\n        'Day-30 and day-60 check-ins with EJC directly — the district lead sees what the first cycle produced before any adjustments are made',\n      ] },\n      { marker: '🏫', title: 'Campus Principals & APs', sub: 'All campuses · Level-specific builds', recvLabel: 'What each principal receives', items: [\n        'A protocol built for their campus — their staffing, their schedule, their diagnostic structure',\n        'A monitoring view with three leading indicators, pulled into the Command Center from the systems you already run (PowerSchool, your diagnostic) at set intervals — read every Monday, not a semester-end report',\n        'A named escalation trigger — when to move a student up, who makes that call, and what happens next',\n        'A first-week activation checklist — confirmed assignments, confirmed groupings, system ready before Monday',\n      ] },\n      { marker: '👥', title: 'Student Support Personnel', sub: 'ES & MS campuses', recvLabel: 'What support personnel receive', items: [\n        'A Support Session Guide — which students they have this week, what the diagnostic shows, what the teacher already tried, and what the session targets',\n        'A movement trigger — a named answer to \"when do I move this student?\" that does not depend on who they ask that day',\n        'A handoff structure — what to receive from the classroom teacher before the session and what to document after',\n        'Alignment with Walkthrough observation cycles — so what observers are looking for reinforces what the protocol asks support personnel to do',\n      ] },\n      { marker: '📋', title: 'Classroom Teachers', sub: 'All levels', recvLabel: 'What teachers receive', items: [\n        'A two-sentence flag — what to write, where it goes, and what happens after they send it — so flagging a student takes less than two minutes',\n        'Two diagnostic fields to check — not the full dashboard; just the two data points that trigger action in the routing protocol',\n        'Clarity on what changes in Core Literacy when the protocol is active, and what stays exactly the same',\n      ] },\n      { marker: '🎓', title: 'School Counselors & Grad Coaches', sub: 'High School campus', recvLabel: 'What counselors receive', items: [\n        'The early warning identification list — how it arrives, what it means, and what their role is in the 30-day response',\n        'A family communication guide — when and how families are brought into the triage response, scripted rather than improvised',\n        'A clear escalation line — what triggers a counselor-level intervention versus a support-personnel-level adjustment',\n      ] },\n      { marker: '⬡', title: 'EJC Project Lead', sub: 'Tyra Harrison · EdJustice Collective', recvLabel: 'EJC\\u2019s role at every stage', items: [\n        'Discovery — leads each campus session; listens before building; delivers a campus-specific brief for the CSO\\u2019s review',\n        'Build — builds each protocol from the brief; the CSO reviews before any campus sees it',\n        'Orientation — leads each 90-minute campus session; confirms every role can answer \"what do I do Monday morning?\"',\n        'Launch — present through the first cycle; leads day-30 and day-60 check-ins with the CSO directly; hands off a self-sustaining system at day 60',\n      ] },\n    ];\n  }\n\n  get DELIV_GROUPS() {\n    return [\n      { icon: '🍎', title: 'Elementary · K–4 · Core Literacy & Diagnostic', meta: '5 deliverables per campus', rows: [\n        { name: 'Core Literacy Routing Protocol', meta: 'Per campus · Built from diagnostic data', who: ['Teachers', 'Support Personnel', 'Principal'], purpose: 'Closes the gap between what diagnostic shows and what happens in the Core Literacy block. Teachers and support personnel are no longer making individual judgment calls about grouping and movement — the protocol makes that decision consistently across the campus, every cycle.' },\n        { name: 'Support Session Guide', meta: 'Per campus · Updated each diagnostic cycle', who: ['Support Personnel', 'Auto-generated'], purpose: 'Answers the question every support staff member carries into the room but rarely has answered for them: which students do I have this week, what does the data say they need, and what did the teacher already try? The guide replaces improvisation with a prepared starting point before every session.' },\n        { name: 'Escalation Pathway', meta: 'Per campus · Named trigger + named response', who: ['Principal', 'Teachers', 'Support Personnel'], purpose: 'Names the trigger that answers \"when does a student need more than Core Literacy provides?\" and the specific next step that follows. Removes the ambiguity that causes the students who need the most to wait the longest — because no one was certain whose call it was to make.' },\n        { name: 'Principal Monitoring View', meta: 'Per campus · Three indicators · Weekly', who: ['Principal', 'CSO'], purpose: 'Three leading indicators surfaced in the Command Center each week — pulled automatically from the systems you already run (PowerSchool, your diagnostic) at set intervals, not a sheet anyone fills in. A signal that allows a mid-course correction before the diagnostic cycle closes.' },\n        { name: 'Student Transition Record', meta: 'Per student · ES → MS · Delivered in June', who: ['MS Principal', 'Support Personnel', 'CSO', 'Auto-generated'], purpose: 'Closes the August gap. A student who spent a year in Core Literacy Tier 2 at one elementary campus arrives at the receiving middle campus and the support personnel have no idea what that team already built. This record — generated automatically from data the ES team already entered — travels with the student so the middle-school support-personnel assignment is ready before orientation begins.' },\n      ] },\n      { icon: '🧭', title: 'Middle · Grades 5–8 · Student Support Alignment', meta: '5 deliverables per campus', rows: [\n        { name: 'Diagnostic-to-Assignment Protocol', meta: 'Per campus · Runs before each week starts', who: ['Student Support Lead', 'Principal', 'Auto-generated'], purpose: 'Connects diagnostic data directly to support-personnel assignments before Monday morning. Replaces the current pattern — where assignments depend on schedule availability or relationship — with a data-driven routing decision that happens before the week begins, not the morning of.' },\n        { name: 'Teacher–Support Handoff Structure', meta: 'Per campus · Before and after every session', who: ['Teachers', 'Support Personnel'], purpose: 'Defines exactly what passes between the classroom teacher and the support staff member before each session and what gets documented after. Removes the gap where a support staff member arrives without knowing what the teacher already tried and a teacher never learns what they observed — so both are working from incomplete information about the same student.' },\n        { name: 'Movement Trigger', meta: 'Per campus · Named decision point', who: ['Support Personnel', 'Principal'], purpose: 'Answers the question every support staff member in every program carries but rarely has answered: when do I move this student? The trigger is specific, named, and does not depend on who a support staff member happens to ask on a given day. Every support staff member on every campus has the same answer.' },\n        { name: 'Walkthrough Observation Alignment', meta: 'Per campus · Connects coaching to the protocol', who: ['Student Support Lead', 'Principal'], purpose: 'Aligns what Walkthrough observation cycles are looking for with what the routing protocol asks support personnel to do. When observation reinforces the system rather than running parallel to it, coaching becomes a mechanism for protocol fidelity rather than a separate improvement track.' },\n        { name: 'Principal Monitoring View', meta: 'Per campus · Shared architecture with ES', who: ['Principal', 'CSO'], purpose: 'Same architecture and language as the elementary monitoring view — intentionally. When the CSO moves from a conversation with one elementary principal to a conversation with one middle principal, the signals being read are identical. Every campus, one shared language.' },\n      ] },\n      { icon: '🎓', title: 'High School · Grades 9–12 · Graduation Pathway Triage', meta: '5 deliverables', rows: [\n        { name: 'Early Warning Identification Protocol', meta: '9th & 10th grade focus · Runs each cycle', who: ['HS Principal', 'Counselors', 'CSO'], purpose: 'Names which students are showing the signal pattern — credit gaps, reading gaps, and attendance flags — before semester end, when there is still time to act. Moves the identification window from week 8 of the semester to the first diagnostic cycle, so the 30-day response can begin before the window has already closed.' },\n        { name: '30-Day Triage Response', meta: 'Named person · Named session · Named target', who: ['Support Personnel', 'Counselors', 'HS Principal'], purpose: 'Defines exactly what happens in the 30 days after a student is identified — who is assigned, what the session targets, and what triggers an escalation. Replaces the referral form with a protocol, so identification produces immediate action rather than a process that takes weeks to complete.' },\n        { name: 'Literacy-in-Content Guide', meta: 'For classroom teachers · No schedule changes', who: ['Content Teachers', 'HS Principal'], purpose: 'Identifies one instructional move per content unit that provides literacy support inside the existing course — without adding a period or requiring teachers to become reading specialists. Built for the content teachers who are already working with students on the identification list, so literacy support is integrated rather than parallel.' },\n        { name: 'Student Support Targeting Protocol', meta: 'HS support personnel · Literacy-specific routing', who: ['Support Personnel', 'HS Principal'], purpose: 'Distinguishes which students the student support personnel should be assigned for literacy-specific support versus general academic help — so the support personnel with the most relevant capacity are working with the students who most need what they can specifically offer, rather than being assigned by general availability.' },\n        { name: 'Graduation Pathway View', meta: 'Weekly · Principal + CSO visibility', who: ['HS Principal', 'CSO'], purpose: 'Gives the HS principal and the CSO a shared weekly view of which students are on track and which are in the 30-day window — before the semester closes. Replaces the pattern where a student\\u2019s status only becomes visible at the point when options are most limited.' },\n      ] },\n      { icon: '🛰️', title: 'Network · All campuses · The CSO\\u2019s view', meta: '4 deliverables', rows: [\n        { name: 'Network Monitoring View', meta: 'CSO-level · All campuses · Each cycle', who: ['CSO only'], purpose: 'Gives the CSO one view across all campuses — which campuses have completed their identification cycle, where escalation has fired, and where it hasn\\u2019t — so a principal conversation is informed rather than reactive. Not student-level data; system-level signals that allow the CSO to see where the protocol is working and where it needs attention.' },\n        { name: 'Cross-Level Transition Protocol', meta: 'ES → MS → HS · Runs each June', who: ['CSO', 'Sending Principal', 'Receiving Principal', 'Auto-generated'], purpose: 'The process and the Student Transition Records it produces are the mechanism by which what one campus team built does not disappear when a student moves to the next level. Runs each June as part of the standard close-of-year process — no additional data entry required from any campus team.' },\n        { name: 'Shared Decision Language', meta: 'All campuses · Built into every protocol', who: ['CSO', 'All Principals'], purpose: 'Not a separate deliverable so much as a structural feature of the entire build — every protocol at every level uses the same trigger language, the same escalation terminology, and the same monitoring indicators. When the CSO walks into a principal meeting at any of the campuses, every principal describes students the same way.' },\n        { name: 'Role-Specific Quick-Start Guides', meta: 'Per campus · One guide per role · At orientation', who: ['Teachers', 'Support Personnel', 'Principals', 'Counselors'], purpose: 'Every person who touches the system receives exactly one page — what they do, when they do it, and what happens next. Not a summary of the full protocol. The specific actions for their role, written so they can answer \"what do I do Monday morning?\" without opening anything else. This is what each person carries.' },\n      ] },\n    ];\n  }\n\n  get BRINGS() {\n    return [\n      { n: '1', title: 'Current master schedule — intervention block', text: 'The actual schedule showing when the Core Literacy or equivalent intervention block runs for each grade, who leads it, and what the block looks like on a typical day. A printed or screen-shared copy is fine.' },\n      { n: '2', title: 'diagnostic report — most recent cycle', text: 'The class-level or grade-level diagnostic report from the most recent diagnostic cycle. It does not need to be formatted or summarized — the raw report is exactly what is needed to understand how data currently flows from assessment to action.' },\n      { n: '3', title: 'Support personnel roster and current assignments', text: 'The list of support personnel currently assigned to this campus, which students or groups each support staff member is working with, and how those assignments were made. If there is a written assignment sheet or spreadsheet, bring it. If assignments are informal, that is important to know too.' },\n      { n: '4', title: 'Walkthrough observation data — last 90 days', text: 'Observation records from the past 90 days for support personnel working in the intervention block. The focus is on what is being observed and whether observation cycles are connected to what support personnel are being asked to do with students.' },\n      { n: '5', title: 'Any active intervention-team or student-of-concern documentation', text: 'Current Student of Concern forms or active intervention-team documentation for students currently receiving Tier 2 or Tier 3 support. This helps establish the boundary between what student support personnel handle and what is already in a formal intervention plan.' },\n      { n: '6', title: 'Five to eight students the principal is thinking about', text: 'Not a formal list — just the names that come to mind when the principal asks themselves: which students am I watching right now who are not moving the way I expect them to? These students anchor the entire discovery conversation in real cases rather than abstract process.' },\n    ];\n  }\n\n  get AREAS_DATA() {\n    return [\n      { area: 'The Schedule', sub: 'How the intervention block actually runs', questions: [\n        { q: 'When does the intervention block run for each grade, and who has the authority to protect it when something else competes for that time? What most commonly pulls students out of the block during a typical week?', surfaces: 'Whether the block is structurally protected or whether it runs at the discretion of whoever is managing the day. A block that competes with assemblies, pull-outs, and testing is not a block that can carry a routing protocol — the protocol will collapse the first week a conflict arises.' },\n        { q: 'When a support staff member is absent, what happens to the students assigned to them? Is there a sub protocol, a coverage plan, or does the session simply not happen?', surfaces: 'The fragility of the current system. If the intervention depends entirely on one support staff member being present, the most vulnerable students lose their support the most often — because coverage gaps fall unevenly. This shapes how the protocol handles continuity.' },\n        { q: 'Walk me through what the block looks like on a day it runs well. What time does it start, who is in the room, what are students doing when they arrive, and how does the support staff member know what to work on?', surfaces: 'The gap between the intended model and the actual practice. Principals describe the ideal; what comes out in the details reveals the real structure — or the absence of one.' },\n      ] },\n      { area: 'The Assignment', sub: 'How support personnel are matched to students', questions: [\n        { q: 'Right now, who makes the decision about which support staff member works with which students — and what information goes into that decision? Is it based on the diagnostic, on schedule availability, on teacher request, or on something else?', surfaces: 'Whether assignment is systematic or relational. In most support programs, assignments are driven by availability and familiarity — not by what the diagnostic says the student needs. That is not a failure of the people involved; it is a missing protocol.' },\n        { q: 'How often do support-personnel assignments change during the year — and what triggers a change? Does the diagnostic cycle produce new assignments, or do support personnel tend to stay with the same students from September through June?', surfaces: 'Whether the assignment system is dynamic or static. A support-staff–student relationship built on familiarity has real value — the protocol does not eliminate it. But if assignments never change regardless of what the diagnostic shows, students who are ready to move up or down in intensity are stuck.' },\n        { q: 'Of the five to eight students you brought to this session — look at each one\\u2019s current support-personnel assignment. Was that assignment made because of what the diagnostic said, or for a different reason?', surfaces: 'The real assignment logic, grounded in specific students the principal already knows. This question tends to be where principals recognize the gap themselves — because when they look at actual students, the mismatch between diagnostic data and assignment becomes visible.' },\n      ] },\n      { area: 'The Data', sub: 'Screening, identification, and how data moves to support', questions: [\n        { q: 'What does it actually take for a student to be identified for student support at this campus — and is that threshold written down anywhere? Who makes the final identification decision, and how is it documented?', surfaces: 'Whether identification is systematic or discretionary. In most support programs, identification is driven by teacher concern rather than a defined screening threshold — which means students who have a strong relationship with their teacher get referred, and students who don\\u2019t may not. A shared threshold that applies consistently across the campus is one of the core outputs of the build.' },\n        { q: 'When the diagnostic cycle closes and results come in, where do those results actually go — and in what form does the Student Support Lead or a classroom teacher access them? When the Student Support Lead sits down to assign support personnel for the week, what do they look at, and where did that information come from?', surfaces: 'The distance between the data and the people who need to act on it. A diagnostic score that lives in the platform but never reaches the support staff member before the session is not a usable data point for the protocol. The protocol is built around the data pathway that actually exists, not the one that was intended.' },\n        { q: 'EJC does not access student records directly and does not receive files with student names or ID numbers. Who is the campus data coordinator, and what does a de-identified data pull typically look like for them — a routine export, or something that requires advance planning?', surfaces: 'To build the routing protocol, EJC needs structural information only: how many students per grade are below benchmark, what the score distribution looks like, and how existing intervention groups are structured. That information travels from the data coordinator to EJC with all student identifiers removed before it leaves the district\\u2019s system. A coordinator who can run a de-identified export in an afternoon sets a different build timeline than one who needs two weeks. Both are workable.' },\n      ] },\n      { area: 'The Data Handoff', sub: 'What support personnel know before the session starts', questions: [\n        { q: 'Before a support staff member sits down with a student on Monday morning, what do they know about that student? Where did that information come from, and when did they receive it?', surfaces: 'Whether support personnel are working from current data or from impressions accumulated over time. In most programs, support personnel know what they have learned from working with the student — which is valuable, but it is not the same as knowing what the diagnostic said last cycle.' },\n        { q: 'After a support session, does the classroom teacher learn what happened? Is there a structured way that information travels from the support staff member back to the teacher, or does it depend on those two people finding each other?', surfaces: 'Whether there is a closed loop or an open one. A teacher who submitted a concern about a student and never hears back stops submitting concerns. The protocol has to close the loop — documented, not conversational.' },\n        { q: 'When the diagnostic cycle closes and new scores come in, how does that information reach the support staff member? Is there a formal process, or do they access it independently if they know to look?', surfaces: 'The data handoff gap — the most common place where a well-resourced support program produces general support instead of targeted intervention. Support personnel have to know what the data says before the session, not after it.' },\n      ] },\n      { area: 'The Movement Trigger', sub: 'When and how a student moves up or out', questions: [\n        { q: 'When a student has been in the intervention block for a full cycle without showing progress, what triggers the next conversation? Who initiates it, when does it happen, and what are the possible outcomes?', surfaces: 'Whether there is a named decision point or an ambiguous one. In most schools, the answer involves a data meeting at some point — but the specific trigger, the specific person who calls the conversation, and the specific window it operates in are rarely named. That gap is where students stay in the same level of support for an entire year.' },\n        { q: 'Of the five to eight students you brought — for any student who has been in the current support level for more than one diagnostic cycle, what is the documented reason they have not moved? Is that reason written down anywhere?', surfaces: 'Whether movement decisions are documented or assumed. A student who has been in the same support level across multiple cycles is the clearest signal that a documented movement decision is missing.' },\n      ] },\n    ];\n  }\n\n  renderVals() {\n    const hero = this.props.heroStyle || 'split';\n    const work = this.props.workStyle || 'rows';\n    const heroHasMark = hero === 'split' || hero === 'panel';\n    const heroPanelStyle = hero === 'panel'\n      ? 'background:#E0F7F5;border-radius:18px;padding:44px 48px;'\n      : '';\n    const heroGridStyle = heroHasMark\n      ? 'display:grid;grid-template-columns:1.35fr 0.82fr;gap:48px;align-items:center;'\n      : 'display:block;max-width:820px;';\n\n    const workWrapStyle = 'display:flex;flex-direction:column;gap:24px;';\n    const levels = this.LEVELS;\n\n    const areas = this.AREAS_DATA.map((a, i) => {\n      const open = !!this.state.openAreas[i];\n      return {\n        ...a,\n        open,\n        countLabel: a.questions.length + ' questions',\n        caretStyle: 'font-size:14px;color:#1ABCB0;display:inline-block;transition:transform .2s;transform:rotate(' + (open ? '180' : '0') + 'deg);',\n        toggle: () => this.toggleArea(i),\n      };\n    });\n\n    const sec = this.state.activeSection;\n    const NAV = [\n      { id: 'builds', href: '#builds', label: 'The MTSS build', sub: 'Scope what you fund' },\n      { id: 'command', href: '#command', label: 'Command Center', sub: 'One live picture' },\n      { id: 'safety', href: '#safety', label: 'Safety & FERPA', sub: 'Built with your tech team' },\n      { id: 'work', href: '#work', label: 'The two systems', sub: 'What each level does' },\n      { id: 'timeline', href: '#timeline', label: 'Rollout & timeline', sub: 'Three-week cycles' },\n      { id: 'roles', href: '#roles', label: 'Who\\u2019s involved', sub: 'Every role, what they get' },\n      { id: 'deliverables', href: '#deliverables', label: 'Every deliverable', sub: 'What you walk away with' },\n      { id: 'data', href: '#data', label: 'Data, ownership & cost', sub: 'Security & what you own' },\n      { id: 'sample', href: '#sample', label: 'A sample session', sub: 'See discovery in action' },\n    ];\n    const navItems = NAV.map((n) => {\n      const active = sec === n.id;\n      return {\n        href: n.href, label: n.label, sub: n.sub, close: this.closeNav,\n        style: 'position:relative;display:flex;align-items:flex-start;text-decoration:none;padding:9px 11px 9px 13px;border-radius:9px;color:' + (active ? '#0D6B64' : '#1A2A30') + ';background:' + (active ? '#E0F7F5' : 'transparent') + ';',\n        barStyle: 'position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:2px;background:' + (active ? '#1ABCB0' : 'transparent') + ';',\n      };\n    });\n\n    const f = this.state.form;\n    const emailBase = 'width:100%;font-family:inherit;font-size:14px;color:#1A2A30;border:1px solid #E8EAEA;border-radius:9px;padding:11px 13px;outline:none;';\n    return {\n      navItems,\n      railOpenClass: this.state.navOpen ? 'is-open' : '',\n      toggleNav: this.toggleNav,\n      closeNav: this.closeNav,\n      gated: this.state.gated,\n      fName: f.name, fEmail: f.email, fDistrict: f.district,\n      emailStyle: emailBase + (this.state.error ? 'border-color:#C56A1E;' : ''),\n      hasError: !!this.state.error,\n      errorMsg: this.state.error,\n      submitLabel: this.state.sending ? 'Opening…' : 'Open the full board',\n      onName: this.setField('name'),\n      onEmail: this.setField('email'),\n      onDistrict: this.setField('district'),\n      onSubmit: this.submitGate,\n      onSkip: this.skipGate,\n      heroHasMark, heroPanelStyle, heroGridStyle,\n      workWrapStyle,\n      levels,\n      stages: this.STAGES,\n      roles: this.ROLES,\n      delivGroups: this.DELIV_GROUPS,\n      brings: this.BRINGS,\n      areas,\n      stats: [\n        { icon: '🚦', k: '2 systems', v: 'kept separate · one MTSS' },\n        { icon: '⏱️', k: '≤ 3 weeks', v: 'per build cycle' },\n        { icon: '💸', k: 'Zero', v: 'new hires needed' },\n        { icon: '🔑', k: '100%', v: 'yours at handoff' },\n      ],\n      dataFlow: [\n        { lead: 'diagnostic exports —', text: 'delivered by your data coordinator as CSV or Excel on the agreed cycle schedule. EJC builds from exports; no platform login required.' },\n        { lead: 'Student Transition Records —', text: 'generated from data your ES teams have already entered. No additional data entry required from campus staff.' },\n        { lead: 'No direct system access.', text: 'No student PII beyond what appears in coordinator-delivered exports. The district retains all data at all times.' },\n      ],\n      ownership: [\n        { lead: 'All tools and documentation', text: 'are transferred to your designated network lead at the day-60 confirmation.' },\n        { lead: 'All access credentials', text: 'for any platform layer are transferred to the district at go-live. EJC retains no access after the engagement closes.' },\n      ],\n      steps: [\n        { n: '01', lead: 'Send pre-engagement materials.', text: 'Campus schedules, diagnostic export sample, data coordinator contact, current support-personnel assignment process. One document per campus. EJC sends the intake template.' },\n        { n: '02', lead: 'Discovery is scheduled.', text: 'EJC schedules one discovery session per campus and sends the build-brief template. Discovery opens in the first week after materials arrive.' },\n        { n: '03', lead: 'Build begins from discovery.', text: 'Each campus protocol is built from its own discovery brief, with CSO review before anything reaches a principal — never delivered as a template.' },\n      ],\n      calendar: [\n        { when: 'Week 1', name: 'Discovery', detail: 'One session per campus · Build briefs confirmed' },\n        { when: 'Weeks 2–4', name: 'Build', detail: '≤ 3 weeks per campus · ES → MS → HS · CSO reviews each' },\n        { when: 'Before launch', name: 'Orientation', detail: '90 min per campus · All roles ready' },\n        { when: 'First cycle', name: 'Launch', detail: 'Day-30 check-in · Day-60 handoff' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
